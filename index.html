<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLens — 股票查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f9f8; --surface:#ffffff; --surface-2:#f4f3ef;
  --border:#e8e6e0; --border-strong:#d9d6cf;
  --ink:#1f1e1d; --ink-2:#3a3835; --muted:#6b6862; --muted-2:#908c84;
  --accent:#c96442; --accent-h:#b25333; --accent-soft:#f3e8df;
  --up:#2f7a52; --up-soft:#e3f1e8; --down:#c0432c; --down-soft:#f6e3dd;
  --sh:0 1px 0 rgba(20,18,15,.02),0 1px 2px rgba(20,18,15,.04);
  --r:14px; --rs:10px;
}
html{font-size:16px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;font-feature-settings:'cv11','ss01','ss03'}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}

/* ── Nav ──────────────────────────────────────── */
.nav{position:sticky;top:0;z-index:200;background:rgba(249,249,248,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1240px;margin:0 auto;padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-size:17px;font-weight:600;letter-spacing:-.01em}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:8px;position:relative;display:grid;place-items:center}
.logo-mark::before,.logo-mark::after{content:"";position:absolute;background:#f9f9f8;border-radius:1px}
.logo-mark::before{width:11px;height:2px;bottom:8px;left:8px}
.logo-mark::after{width:2px;height:11px;bottom:8px;left:13px}
.logo .dim{color:var(--muted);font-weight:400}
.nav-right{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}

.mkt-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border:1px solid var(--border);border-radius:999px;background:var(--surface);font-size:12px;color:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.mkt-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--up);box-shadow:0 0 0 3px rgba(47,122,82,.12);animation:pulse 2s infinite}

.nav-wl{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border:1px solid var(--border);border-radius:999px;background:var(--surface);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.nav-wl:hover{border-color:var(--ink-2);color:var(--ink)}
.nav-wl svg{width:12px;height:12px}
.nav-wl .nw-cnt{font-family:'JetBrains Mono',monospace;color:var(--ink);font-weight:500}
.nav-wl.empty .nw-cnt{color:var(--muted-2)}

.lang-toggle{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:2px}
.lang-toggle button{border:none;background:transparent;font:inherit;font-size:11px;font-weight:500;color:var(--muted);padding:4px 9px;border-radius:999px;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.lang-toggle button:hover{color:var(--ink)}
.lang-toggle button.active{background:var(--accent);color:#fff}

.nav-powered{font-size:12px;color:var(--muted)}
.nav-powered b{color:var(--ink-2);font-weight:500}
@media(max-width:640px){.mkt-pill,.nav-powered{display:none}}

/* ── Main ─────────────────────────────────────── */
main{max-width:1240px;margin:0 auto;padding:44px 28px 80px}
@media(max-width:600px){main{padding:28px 16px 60px}}

/* ── Hero ─────────────────────────────────────── */
.hero{text-align:center;margin-bottom:36px}
.hero h1{font-size:32px;font-weight:500;letter-spacing:-.02em;margin:0 0 8px;color:var(--ink);line-height:1.2}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{color:var(--muted);margin:0 0 28px;font-size:15px}
@media(max-width:600px){.hero h1{font-size:24px}}

.search-wrap{max-width:640px;margin:0 auto}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border-strong);border-radius:16px;padding:4px 6px 4px 18px;box-shadow:var(--sh);transition:border-color .15s,box-shadow .15s}
.search-box:focus-within{border-color:#b9b4a8;box-shadow:0 0 0 4px rgba(201,100,66,.08)}
.search-box svg{color:var(--muted);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:15px;color:var(--ink);padding:14px 0}
.search-box input::placeholder{color:var(--muted-2)}
.srch-btn{border:none;background:var(--accent);color:#fff;font:inherit;font-weight:500;font-size:13px;padding:10px 18px;border-radius:12px;cursor:pointer;transition:background .15s,transform 80ms;white-space:nowrap;flex-shrink:0}
.srch-btn:hover:not(:disabled){background:var(--accent-h)}
.srch-btn:active:not(:disabled){transform:scale(.97)}
.srch-btn:disabled{background:var(--muted-2);cursor:not-allowed}

.hot-row{margin-top:18px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.hot-row .hlabel{font-size:12px;color:var(--muted-2);padding:7px 4px 7px 0;align-self:center}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--border);background:var(--surface);border-radius:999px;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace}
.chip:hover{border-color:var(--ink-2);color:var(--ink)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip .dlt{font-family:'Inter',sans-serif;font-size:11px;color:var(--up)}
.chip .dlt.dn{color:var(--down)}
.chip.active .dlt{color:rgba(255,255,255,.75)}
.chip.is-watched::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);margin-right:1px}
.chip.active.is-watched::before{background:rgba(255,255,255,.8)}

/* ── Error state ──────────────────────────────── */
.state-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:60px 24px;text-align:center;box-shadow:var(--sh)}
.state-ico{font-size:32px;margin-bottom:14px}
.state-ttl{font-size:15px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.state-desc{font-size:13.5px;color:var(--muted-2);max-width:380px;margin:0 auto;line-height:1.65;white-space:pre-wrap}

/* ── Skeleton ─────────────────────────────────── */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.sk{display:inline-block;vertical-align:middle;background:linear-gradient(90deg,#efefed 25%,#e5e5e3 50%,#efefed 75%);background-size:1200px 100%;animation:shimmer 1.6s infinite linear;border-radius:4px}

/* ── Results grid ─────────────────────────────── */
.grid{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:20px}
@media(max-width:980px){.grid{grid-template-columns:1fr}}

/* ── Card ─────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
.left-col .card+.card{margin-top:20px}

/* ── Stock header ─────────────────────────────── */
.stock-head{padding:22px 24px 0}
@media(max-width:600px){.stock-head{padding:16px 16px 0}}
.stock-head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}
.stock-id{display:flex;align-items:center;gap:14px}
.stock-logo{width:44px;height:44px;border-radius:12px;background:var(--stock-bg,oklch(.94 .02 60));color:var(--stock-fg,oklch(.42 .04 60));border:1px solid var(--stock-bd,oklch(.88 .03 60));display:grid;place-items:center;font-weight:600;font-size:14px;letter-spacing:.02em;font-family:'JetBrains Mono',monospace;transition:background .25s,color .25s,border-color .25s;flex-shrink:0}
.stock-meta h2{margin:0;font-size:20px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.stock-meta h2 .sym{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--stock-fg,var(--ink-2));transition:color .25s}
.stock-meta h2 .nm{color:var(--muted);font-weight:400;font-size:14px}
.stock-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.stock-tags span{font-size:11px;color:var(--muted);padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface-2)}
.mkt-state{text-align:right;font-size:12px;color:var(--muted);flex-shrink:0}
.mkt-state .live-ind{display:inline-flex;align-items:center;gap:6px;color:var(--ink-2);font-weight:500}
.mkt-state .live-ind::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--up);box-shadow:0 0 0 3px rgba(47,122,82,.15);animation:pulse 2s infinite}
.mkt-state .live-time{font-size:11px;margin-top:3px}

.price-line{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.price-main{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:500;letter-spacing:-.02em;color:var(--ink);min-height:38px}
@media(max-width:600px){.price-main{font-size:30px}}
.price-delta{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;min-height:30px}
.price-delta.up{background:var(--up-soft);color:var(--up)}
.price-delta.down{background:var(--down-soft);color:var(--down)}
.price-delta svg{width:12px;height:12px}

.watch-btn{margin-left:auto;display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--border-strong);background:var(--surface);border-radius:999px;font:inherit;font-size:12px;font-weight:500;color:var(--ink-2);cursor:pointer;transition:all .15s}
.watch-btn:hover{border-color:var(--ink-2);color:var(--ink)}
.watch-btn .star-icon{width:13px;height:13px;transition:transform .2s}
.watch-btn.is-on{background:var(--accent-soft);border-color:#e5cdbf;color:var(--accent)}
.watch-btn.is-on .star-icon{fill:var(--accent);stroke:var(--accent);transform:scale(1.05)}
.watch-btn.pop .star-icon{animation:starPop .42s ease}
@keyframes starPop{0%{transform:scale(1)}40%{transform:scale(1.35) rotate(-8deg)}100%{transform:scale(1.05)}}

/* ── Stats ────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--border)}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{padding:14px 20px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
@media(max-width:720px){.stat:nth-child(2n){border-right:none}}
.stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat .v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;color:var(--ink);min-height:22px}
.stat .sub{font-size:11px;color:var(--muted-2);margin-top:2px;font-family:'JetBrains Mono',monospace}

/* ── Chart card ───────────────────────────────── */
.chart-head{display:flex;justify-content:space-between;align-items:center;padding:18px 24px 6px;flex-wrap:wrap;gap:12px}
.chart-head h3{margin:0;font-size:14px;font-weight:500;color:var(--ink-2);display:flex;align-items:center;gap:8px}
.chart-badge{font-size:11px;color:var(--muted);font-weight:400;padding:2px 7px;border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace}
.timeframes{display:inline-flex;background:var(--surface-2);border-radius:8px;padding:3px;gap:2px}
.tf-btn{border:none;background:transparent;font:inherit;font-size:12px;font-weight:500;color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.tf-btn:hover{color:var(--ink)}
.tf-btn.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(20,18,15,.06)}
.chart-wrap{padding:8px 12px 18px;position:relative}
.tv-chart{display:block;width:100%;height:360px;border:none;border-radius:var(--rs);transition:opacity .25s}
.tv-chart.tv-loading{opacity:0}
.chart-loader{position:absolute;inset:8px 12px 18px;border-radius:var(--rs);background:var(--surface-2);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;font-size:13.5px;color:var(--muted);pointer-events:none}
.chart-loader[hidden]{display:none!important}
.chart-spin{width:28px;height:28px;border:2.5px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.chart-wrap{padding:8px 8px 12px}.tv-chart{height:280px}.chart-loader{inset:8px 8px 12px}}

/* ── News card ────────────────────────────────── */
.news-card{display:flex;flex-direction:column;height:fit-content}
.news-head{padding:18px 22px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.news-head h3{margin:0;font-size:14px;font-weight:500;color:var(--ink-2);display:flex;align-items:center;gap:8px}
.news-head .n-count{font-size:11px;color:var(--muted);padding:2px 8px;background:var(--surface-2);border-radius:4px;font-family:'JetBrains Mono',monospace}
.news-list{overflow-y:auto;max-height:720px}
.news-list::-webkit-scrollbar{width:6px}
.news-list::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.news-item{padding:14px 20px;border-bottom:1px solid var(--border);transition:background .12s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:var(--surface-2)}
.news-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:7px}
.n-src{color:var(--accent);font-weight:500}
.n-dot{width:3px;height:3px;border-radius:50%;background:var(--muted-2);flex-shrink:0}
.n-sent{margin-left:auto;font-size:10px;padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;letter-spacing:.02em}
.n-sent.pos{background:var(--up-soft);color:var(--up)}
.n-sent.neg{background:var(--down-soft);color:var(--down)}
.n-sent.neu{background:var(--surface-2);color:var(--muted)}
.news-title{font-size:13.5px;font-weight:500;line-height:1.4;margin-bottom:6px;letter-spacing:-.005em}
.news-title a{color:var(--ink);text-decoration:none}
.news-title a:hover{color:var(--accent)}
.news-summary{font-size:12.5px;color:var(--muted);line-height:1.55;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-summary.translated{background:var(--accent-soft);border-left:2px solid var(--accent);padding:8px 10px;border-radius:0 6px 6px 0;color:var(--ink-2);-webkit-line-clamp:unset}
.news-actions{display:flex;align-items:center;gap:6px}
.btn-ghost{border:1px solid var(--border);background:var(--surface);color:var(--ink-2);font:inherit;font-size:11px;font-weight:500;padding:5px 10px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.btn-ghost:hover:not(:disabled){border-color:var(--ink-2);color:var(--ink)}
.btn-ghost.is-on{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-ghost:disabled{opacity:.5;cursor:not-allowed}
.mini-spin{display:inline-block;width:10px;height:10px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}

/* ── Footer ───────────────────────────────────── */
footer{max-width:1240px;margin:0 auto;padding:20px 28px 40px;font-size:12px;color:var(--muted-2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;border-top:1px solid var(--border)}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--ink)}

[hidden]{display:none!important}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="javascript:location.reload()">
      <div class="logo-mark" aria-hidden="true"></div>
      <span><b>Stock</b><span class="dim">Lens</span></span>
    </a>
    <div class="nav-right">
      <span class="mkt-pill"><span class="dot"></span><span data-i18n="market_open">市場開市</span></span>
      <button class="nav-wl empty" id="navWatchlist" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span data-i18n="watchlist">自選清單</span>&nbsp;<span class="nw-cnt" id="nwCount">0</span>
      </button>
      <div class="lang-toggle" id="langToggle">
        <button type="button" data-lang="zh" class="active">繁中</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <span class="nav-powered"><span data-i18n="powered_by">技術提供</span> <b>Finnhub</b></span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>

  <!-- Hero -->
  <section class="hero">
    <h1 data-i18n="hero_title">股票<em>即時</em>查詢</h1>
    <p data-i18n="hero_sub">輸入股票代碼，獲取即時行情、K 線圖及最新新聞</p>
    <div class="search-wrap">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="sym-input" data-i18n-ph="search_ph" placeholder="輸入代碼，例如 AAPL" autocomplete="off" spellcheck="false">
        <button id="srch-btn" class="srch-btn" onclick="doSearch()" data-i18n="search">查詢</button>
      </div>
    </div>
    <div class="hot-row">
      <span class="hlabel" data-i18n="trending">熱門</span>
      <span class="chip" data-sym="AAPL"  onclick="qs('AAPL')">AAPL</span>
      <span class="chip" data-sym="TSLA"  onclick="qs('TSLA')">TSLA</span>
      <span class="chip" data-sym="GOOGL" onclick="qs('GOOGL')">GOOGL</span>
      <span class="chip" data-sym="MSFT"  onclick="qs('MSFT')">MSFT</span>
      <span class="chip" data-sym="NVDA"  onclick="qs('NVDA')">NVDA</span>
      <span class="chip" data-sym="AMZN"  onclick="qs('AMZN')">AMZN</span>
      <span class="chip" data-sym="META"  onclick="qs('META')">META</span>
    </div>
  </section>

  <!-- Error -->
  <div id="st-err" hidden>
    <div class="state-card">
      <div class="state-ico">⚠️</div>
      <div class="state-ttl" data-i18n="err_title">查詢失敗</div>
      <div class="state-desc" id="err-msg"></div>
    </div>
  </div>

  <!-- Results grid -->
  <div id="results" class="grid" hidden>

    <!-- LEFT: quote + chart -->
    <div class="left-col">

      <!-- Stock card -->
      <div class="card">
        <div class="stock-head" id="stock-head">
          <div class="stock-head-top">
            <div class="stock-id">
              <div class="stock-logo" id="stock-logo">AA</div>
              <div class="stock-meta">
                <h2>
                  <span class="sym" id="r-sym"></span>
                  <span class="nm"  id="r-name"></span>
                </h2>
                <div class="stock-tags">
                  <span id="r-exchange"></span>
                  <span id="r-sec"></span>
                  <span id="r-currency">USD</span>
                </div>
              </div>
            </div>
            <div class="mkt-state">
              <div class="live-ind" data-i18n="live">即時</div>
              <div class="live-time" id="live-time"></div>
            </div>
          </div>
          <div class="price-line">
            <span class="price-main" id="r-price"></span>
            <span class="price-delta" id="r-delta"></span>
            <button class="watch-btn" id="watchBtn" type="button" aria-pressed="false">
              <svg class="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <span class="watch-label" data-i18n="add_watch">加入自選</span>
            </button>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="k" data-i18n="k_open">開盤</div><div class="v" id="r-open">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_hl">最高 · 最低</div><div class="v" id="r-hl">—</div><div class="sub" id="r-hl-sub"></div></div>
          <div class="stat"><div class="k" data-i18n="k_vol">成交量</div><div class="v" id="r-vol">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_cap">市值</div><div class="v" id="r-cap">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_52w">52 週區間</div><div class="v" id="r-52">—</div><div class="sub" id="r-52pos"></div></div>
        </div>
      </div>

      <!-- Chart card -->
      <div class="card">
        <div class="chart-head">
          <h3>
            <span data-i18n="chart_title">價格走勢</span>
            <span class="chart-badge" id="chart-badge">1M · 日線</span>
          </h3>
          <div class="timeframes">
            <button class="tf-btn active" onclick="switchPeriod('1M',this)">1M</button>
            <button class="tf-btn"        onclick="switchPeriod('3M',this)">3M</button>
            <button class="tf-btn"        onclick="switchPeriod('6M',this)">6M</button>
            <button class="tf-btn"        onclick="switchPeriod('1Y',this)">1Y</button>
            <button class="tf-btn"        onclick="switchPeriod('3Y',this)">3Y</button>
            <button class="tf-btn"        onclick="switchPeriod('5Y',this)">5Y</button>
          </div>
        </div>
        <div class="chart-wrap">
          <div id="tv-loader" class="chart-loader">
            <div class="chart-spin"></div>
            <span data-i18n="chart_loading">圖表載入中…</span>
          </div>
          <iframe id="tv-chart" class="tv-chart tv-loading" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
        </div>
      </div>
    </div>

    <!-- RIGHT: news -->
    <aside class="card news-card">
      <div class="news-head">
        <h3>
          <span data-i18n="latest_news">最新新聞</span>
          <span class="n-count" id="newsCount">0</span>
        </h3>
      </div>
      <div class="news-list" id="news-list"></div>
    </aside>

  </div><!-- /#results -->
</main>

<footer>
  <div data-i18n="footer_left">StockLens · 僅供研究及教育用途，不構成投資建議。</div>
  <div><span data-i18n="footer_delay">報價延遲約 15 分鐘</span> · <a href="#" data-i18n="footer_terms">服務條款</a></div>
</footer>

<script>
'use strict';

/* ── Config ──────────────────────────────────────── */
const FH_KEY  = 'd806uhhr01qj3ct99a30d806uhhr01qj3ct99a3g';
const FH_BASE = 'https://finnhub.io/api/v1';

/* ── i18n ────────────────────────────────────────── */
const I18N = {
  zh:{
    market_open:'市場開市', watchlist:'自選清單', powered_by:'技術提供',
    hero_title:'股票<em>即時</em>查詢', hero_sub:'輸入股票代碼，獲取即時行情、K 線圖及最新新聞',
    search_ph:'輸入代碼，例如 AAPL', search:'查詢', searching:'查詢中…', trending:'熱門',
    live:'即時', err_title:'查詢失敗',
    k_open:'開盤', k_hl:'最高 · 最低', k_vol:'成交量', k_cap:'市值', k_52w:'52 週區間',
    of_range:'% 位置',
    chart_title:'價格走勢', chart_loading:'圖表載入中…', daily:'日線', weekly:'週線',
    latest_news:'最新新聞',
    sent_pos:'利多', sent_neg:'利空', sent_neu:'中性',
    tr_btn:'🌐 翻譯', tr_ing:'翻譯中…', tr_orig:'原文',
    add_watch:'加入自選', on_watch:'已加入自選',
    footer_left:'StockLens · 僅供研究及教育用途，不構成投資建議。',
    footer_delay:'報價延遲約 15 分鐘', footer_terms:'服務條款',
  },
  en:{
    market_open:'Markets open', watchlist:'Watchlist', powered_by:'Powered by',
    hero_title:'Stock <em>real-time</em> lookup', hero_sub:'Enter a ticker for live quotes, charts and the latest news.',
    search_ph:'Enter ticker — e.g. AAPL, TSLA', search:'Search', searching:'Searching…', trending:'Trending',
    live:'Live', err_title:'Query failed',
    k_open:'Open', k_hl:'High · Low', k_vol:'Volume', k_cap:'Market cap', k_52w:'52w range',
    of_range:'% of range',
    chart_title:'Price chart', chart_loading:'Loading chart…', daily:'Daily', weekly:'Weekly',
    latest_news:'Latest news',
    sent_pos:'BULLISH', sent_neg:'BEARISH', sent_neu:'NEUTRAL',
    tr_btn:'🌐 Translate', tr_ing:'Translating…', tr_orig:'Original',
    add_watch:'Add to watchlist', on_watch:'Watchlisted',
    footer_left:'StockLens · For research and educational use. Not financial advice.',
    footer_delay:'Quotes delayed ~15 min', footer_terms:'Terms',
  }
};
function tr(k){ return I18N[currentLang][k] ?? I18N.zh[k] ?? k; }

/* ── Per-stock tint colors ───────────────────────── */
const TINTS = {
  AAPL: {fg:'oklch(.42 .04 60)',   bg:'oklch(.94 .02 60)',   bd:'oklch(.88 .03 60)'},
  TSLA: {fg:'oklch(.48 .13 28)',   bg:'oklch(.94 .03 28)',   bd:'oklch(.88 .05 28)'},
  GOOGL:{fg:'oklch(.48 .11 250)',  bg:'oklch(.94 .025 250)', bd:'oklch(.88 .05 250)'},
  MSFT: {fg:'oklch(.48 .09 195)',  bg:'oklch(.94 .025 195)', bd:'oklch(.88 .05 195)'},
  NVDA: {fg:'oklch(.46 .13 145)',  bg:'oklch(.94 .03 145)',  bd:'oklch(.86 .06 145)'},
  AMZN: {fg:'oklch(.48 .10 55)',   bg:'oklch(.94 .03 55)',   bd:'oklch(.88 .05 55)'},
  META: {fg:'oklch(.48 .10 230)',  bg:'oklch(.94 .025 230)', bd:'oklch(.88 .05 230)'},
};
const DEFAULT_TINT = {fg:'oklch(.42 .06 240)', bg:'oklch(.94 .02 240)', bd:'oklch(.88 .04 240)'};

/* ── State ───────────────────────────────────────── */
const $ = id => document.getElementById(id);
let newsData     = [];
let activePeriod = '1M';
let currentSym   = '';
let currentLang  = localStorage.getItem('stocklens.lang') || 'zh';
const watchlist  = new Set(JSON.parse(
  localStorage.getItem('stocklens.watchlist') || localStorage.getItem('stocklens_wl') || '[]'
));
function saveWatchlist(){ localStorage.setItem('stocklens.watchlist', JSON.stringify([...watchlist])); }

/* ── Boot ────────────────────────────────────────── */
applyLang();
syncNavWatchlist();
fetchChipQuotes();
tick(); setInterval(tick, 1000);

$('sym-input').addEventListener('input',   e => { e.target.value = e.target.value.toUpperCase(); });
$('sym-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => {
    currentLang = b.dataset.lang;
    localStorage.setItem('stocklens.lang', currentLang);
    applyLang();
    if (currentSym) syncWatchBtn();
    renderNews();
  });
});

$('navWatchlist').addEventListener('click', () => {
  if (!watchlist.size) return;
  const arr  = [...watchlist];
  const next = arr.find(s => s !== currentSym) || arr[0];
  qs(next);
});

$('watchBtn').addEventListener('click', () => {
  if (!currentSym) return;
  const btn = $('watchBtn');
  if (watchlist.has(currentSym)) {
    watchlist.delete(currentSym);
  } else {
    watchlist.add(currentSym);
    btn.classList.remove('pop');
    void btn.offsetWidth;
    btn.classList.add('pop');
  }
  saveWatchlist();
  syncWatchBtn();
  syncNavWatchlist();
});

/* ── i18n apply ──────────────────────────────────── */
function applyLang(){
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hant' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = I18N[currentLang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const v = I18N[currentLang][el.dataset.i18nPh];
    if (v !== undefined) el.placeholder = v;
  });
  document.querySelectorAll('.lang-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });
  updateChartBadge();
}

/* ── Clock ───────────────────────────────────────── */
function tick(){
  const d  = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  const el = $('live-time');
  if (el) el.textContent = `${hh}:${mm}:${ss}`;
}

/* ── Chip % quotes (background fetch) ───────────── */
async function fetchChipQuotes(){
  const syms = ['AAPL','TSLA','GOOGL','MSFT','NVDA','AMZN','META'];
  for (const sym of syms) {
    try {
      const q    = await fhFetch(`quote?symbol=${sym}`);
      const chip = document.querySelector(`.chip[data-sym="${sym}"]`);
      if (chip && q.dp !== undefined) {
        const up = q.dp >= 0;
        chip.innerHTML = `${sym} <span class="dlt ${up?'':'dn'}">${up?'+':''}${q.dp.toFixed(2)}%</span>`;
        if (watchlist.has(sym)) chip.classList.add('is-watched');
        if (sym === currentSym)  chip.classList.add('active');
      }
    } catch { /* ignore */ }
    await new Promise(r => setTimeout(r, 400));
  }
}

/* ── Helpers ─────────────────────────────────────── */
const fmt$ = n => '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function fmtCap(m){
  const n = parseFloat(m) * 1e6;
  if (!n || isNaN(n)) return '—';
  return n>=1e12?'$'+(n/1e12).toFixed(2)+'T':n>=1e9?'$'+(n/1e9).toFixed(2)+'B':'$'+(n/1e6).toFixed(2)+'M';
}
function esc(s){
  if (!s) return '';
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}
function tsToDate(ts){ return new Date(ts*1000).toISOString().slice(0,10); }
function detectSentiment(title, summary){
  const text = (title+' '+(summary||'')).toLowerCase();
  const pos = ['beat','beats','surges','record','growth','strong','gains','profit','jumps','rally','soars','upgrade','tops','rises','accelerat','expands'];
  const neg = ['fall','falls','drops','misses','concern','risk','cuts','decline','slump','lawsuit','warning','downgrade','restrict','tariff','tighten','weaker','slow'];
  let s = 0;
  pos.forEach(w => { if (text.includes(w)) s++; });
  neg.forEach(w => { if (text.includes(w)) s--; });
  return s > 0 ? 'pos' : s < 0 ? 'neg' : 'neu';
}

/* ── Finnhub API ─────────────────────────────────── */
async function fhFetch(path){
  const sep = path.includes('?') ? '&' : '?';
  const res  = await fetch(`${FH_BASE}/${path}${sep}token=${FH_KEY}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error){
    if (data.error.toLowerCase().includes('invalid')) throw new Error('Finnhub API Key 無效。');
    if (data.error.toLowerCase().includes('limit'))   throw new Error('已達 Finnhub 請求上限。');
    throw new Error(data.error);
  }
  return data;
}
async function fetchNews(sym){
  const now = Math.floor(Date.now()/1000);
  const to  = tsToDate(now);
  try {
    const d = await fhFetch(`company-news?symbol=${sym}&from=${tsToDate(now-60*86400)}&to=${to}`);
    if (Array.isArray(d) && d.length) return d;
  } catch {}
  try {
    const d = await fhFetch(`company-news?symbol=${sym}&from=${tsToDate(now-180*86400)}&to=${to}`);
    if (Array.isArray(d) && d.length) return d;
  } catch {}
  return [];
}

/* ── Skeletons ───────────────────────────────────── */
const sk  = (w,h,r='4px') => `<span class="sk" style="width:${w};height:${h};border-radius:${r}"></span>`;
const skb = (w,h='14px',mb='8px') => `<div class="sk" style="display:block;width:${w};height:${h};border-radius:4px;margin-bottom:${mb}"></div>`;

function showQuoteSkeleton(){
  $('r-sym').innerHTML  = sk('46px','11px','3px');
  $('r-name').innerHTML = sk('160px','14px');
  $('r-price').innerHTML = sk('155px','38px');
  const d = $('r-delta'); d.className='price-delta'; d.innerHTML=sk('105px','22px','6px');
  ['r-open','r-hl','r-vol','r-cap','r-52'].forEach(id => { if ($(id)) $(id).innerHTML=sk('68px','14px'); });
  $('r-exchange').textContent=''; $('r-sec').textContent=''; $('r-currency').textContent='';
  $('r-hl-sub').textContent=''; $('r-52pos').textContent='';
  $('stock-logo').textContent='';
}
function showNewsSkeleton(){
  $('news-list').innerHTML = Array(5).fill(0).map(() => `
    <div class="news-item" style="pointer-events:none;user-select:none">
      <div class="news-meta" style="margin-bottom:8px">${sk('48px','9px','3px')} ${sk('60px','9px','3px')}</div>
      ${skb('90%','13px','4px')}${skb('72%','13px','4px')}${skb('50%','11px','0')}
    </div>`).join('');
}

/* ── Search ──────────────────────────────────────── */
const qs = sym => { $('sym-input').value = sym; doSearch(); };

async function doSearch(){
  const sym = $('sym-input').value.trim().toUpperCase();
  if (!sym) return;

  currentSym   = sym;
  newsData     = [];
  activePeriod = '1M';

  const btn = $('srch-btn');
  btn.disabled    = true;
  btn.textContent = tr('searching');

  $('st-err').hidden  = true;
  $('results').hidden = false;
  showQuoteSkeleton();
  showNewsSkeleton();

  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tf-btn').classList.add('active');
  $('tv-loader').hidden = false;
  $('tv-chart').classList.add('tv-loading');
  $('tv-chart').onload  = null;
  $('tv-chart').src     = '';

  const quoteP   = fhFetch(`quote?symbol=${sym}`);
  const profileP = fhFetch(`stock/profile2?symbol=${sym}`).catch(() => ({}));
  const metricP  = fhFetch(`stock/metric?symbol=${sym}&metric=all`).catch(() => ({}));
  const newsP    = fetchNews(sym);

  let quote, profile, metric;
  try {
    [quote, profile, metric] = await Promise.all([quoteP, profileP, metricP]);
    if (!quote.pc || quote.pc === 0)
      throw new Error(`找不到股票代碼「${sym}」。\n請確認代碼是否正確（例如 AAPL、TSLA、GOOGL）`);
  } catch(err){
    $('results').hidden = true;
    $('st-err').hidden  = false;
    $('err-msg').textContent = err.message || '查詢失敗，請稍後再試';
    btn.disabled    = false;
    btn.textContent = tr('search');
    return;
  }

  renderQuote(quote, profile, metric, sym);
  syncWatchBtn();
  updateTVChart();
  btn.disabled    = false;
  btn.textContent = tr('search');

  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.sym === sym));

  try {
    const news = await newsP;
    if (currentSym === sym){ newsData = news; renderNews(); }
  } catch {
    if (currentSym === sym) renderNews();
  }
}

/* ── Render: Quote ───────────────────────────────── */
function renderQuote(q, p, m, sym){
  const isUp = (q.d || 0) >= 0;
  const tint = TINTS[sym] || DEFAULT_TINT;

  // Logo + tint
  $('stock-logo').textContent = sym.slice(0,2);
  const sh = $('stock-head');
  sh.style.setProperty('--stock-fg', tint.fg);
  sh.style.setProperty('--stock-bg', tint.bg);
  sh.style.setProperty('--stock-bd', tint.bd);

  $('r-sym').textContent      = sym;
  $('r-name').textContent     = p.name  || sym;
  $('r-exchange').textContent = p.exchange        || '—';
  $('r-sec').textContent      = p.finnhubIndustry || '—';
  $('r-currency').textContent = p.currency        || 'USD';

  $('r-price').textContent = fmt$(q.c);

  const d = $('r-delta');
  d.innerHTML   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="${isUp?'m5 15 7-7 7 7':'m5 9 7 7 7-7'}"/></svg>${isUp?'+':''}${Math.abs(q.d||0).toFixed(2)} (${isUp?'+':''}${Math.abs(q.dp||0).toFixed(2)}%)`;
  d.className   = 'price-delta ' + (isUp ? 'up' : 'down');

  $('r-open').textContent    = fmt$(q.o);
  $('r-hl').textContent      = `${fmt$(q.h)} / ${fmt$(q.l)}`;
  $('r-hl-sub').textContent  = `Range $${(q.h - q.l).toFixed(2)}`;
  $('r-vol').textContent     = '—';
  $('r-cap').textContent     = p.marketCapitalization ? fmtCap(p.marketCapitalization) : '—';

  const h52 = m?.metric?.['52WeekHigh'];
  const l52 = m?.metric?.['52WeekLow'];
  if (h52 && l52){
    $('r-52').textContent    = `${h52.toFixed(2)} — ${l52.toFixed(2)}`;
    const pos = Math.round(100 * (q.c - l52) / (h52 - l52));
    $('r-52pos').textContent = `${Math.max(0,Math.min(100,pos))}${tr('of_range')}`;
  } else {
    $('r-52').textContent    = '—';
    $('r-52pos').textContent = '';
  }
}

/* ── Watchlist ───────────────────────────────────── */
function syncWatchBtn(){
  const btn = $('watchBtn');
  if (!btn || !currentSym) return;
  const on = watchlist.has(currentSym);
  btn.classList.toggle('is-on', on);
  btn.setAttribute('aria-pressed', String(on));
  btn.querySelector('.watch-label').textContent = on ? tr('on_watch') : tr('add_watch');
}
function syncNavWatchlist(){
  const count = watchlist.size;
  $('nwCount').textContent = count;
  $('navWatchlist').classList.toggle('empty', count === 0);
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('is-watched', watchlist.has(c.dataset.sym));
  });
}

/* ── Chart (TradingView) ─────────────────────────── */
const TV_RANGE    = {'1M':'1M','3M':'3M','6M':'6M','1Y':'12M','3Y':'36M','5Y':'60M'};
const TV_INTERVAL = {'1M':'D', '3M':'D', '6M':'D', '1Y':'W',  '3Y':'W',  '5Y':'M' };

function buildTVUrl(sym, period){
  const p = new URLSearchParams({
    symbol: sym, interval: TV_INTERVAL[period]||'D', range: TV_RANGE[period]||'1M',
    theme: 'light', style: '1', locale: 'zh_TW', timezone: 'Asia/Hong_Kong',
    toolbar_bg: 'ffffff', hide_side_toolbar: '0', allow_symbol_change: '1',
    save_image: '0', hideideas: '1', hide_top_toolbar: '0',
  });
  return 'https://www.tradingview.com/widgetembed/?' + p.toString();
}
function updateChartBadge(){
  const el = $('chart-badge');
  if (!el) return;
  const lbl = (activePeriod==='3Y'||activePeriod==='5Y') ? tr('weekly') : tr('daily');
  el.textContent = `${activePeriod} · ${lbl}`;
}
function updateTVChart(){
  if (!currentSym) return;
  const sym = currentSym, frame = $('tv-chart'), loader = $('tv-loader');
  loader.hidden = false;
  frame.classList.add('tv-loading');
  frame.onload = () => {
    if (currentSym !== sym) return;
    frame.classList.remove('tv-loading');
    loader.hidden = true;
  };
  frame.src = buildTVUrl(sym, activePeriod);
  updateChartBadge();
}
function switchPeriod(period, btn){
  activePeriod = period;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateTVChart();
}

/* ── Render: News ────────────────────────────────── */
function renderNews(){
  const el = $('news-list');
  $('newsCount').textContent = newsData.length;
  if (!newsData.length){
    el.innerHTML = `<div style="padding:28px 22px;text-align:center;color:var(--muted-2);font-size:13px;line-height:1.7">暫無最新新聞，請稍後再試</div>`;
    return;
  }
  const sl = {pos:tr('sent_pos'), neg:tr('sent_neg'), neu:tr('sent_neu')};
  el.innerHTML = newsData.slice(0,12).map((item,i) => {
    const date       = tsToDate(item.datetime);
    const hasSummary = !!(item.summary?.trim() && item.summary !== item.headline);
    const sent       = detectSentiment(item.headline, item.summary);
    return `
<div class="news-item">
  <div class="news-meta">
    <span class="n-src">${esc(item.source||'')}</span>
    <span class="n-dot"></span>
    <span>${date}</span>
    <span class="n-sent ${sent}">${sl[sent]}</span>
  </div>
  <div class="news-title">
    <a href="${esc(item.url||'#')}" target="_blank" rel="noopener noreferrer">${esc(item.headline||'')}</a>
  </div>
  ${hasSummary ? `<p class="news-summary" id="ns-${i}">${esc(item.summary)}</p>` : ''}
  <div class="news-actions">
    ${hasSummary ? `<button class="btn-ghost" id="ntr-${i}" onclick="doTranslate(${i})"><span class="tr-lbl">${tr('tr_btn')}</span></button>` : ''}
  </div>
</div>`;
  }).join('');
}

/* ── Translate ───────────────────────────────────── */
async function doTranslate(i){
  const item = newsData[i];
  const btn  = $(`ntr-${i}`);
  const pEl  = $(`ns-${i}`);
  if (!btn || !pEl) return;

  if (btn.classList.contains('is-on')){
    pEl.textContent = item.summary; pEl.className='news-summary';
    btn.classList.remove('is-on'); btn.querySelector('.tr-lbl').textContent = tr('tr_btn');
    return;
  }

  btn.disabled = true;
  btn.querySelector('.tr-lbl').innerHTML = `<span class="mini-spin"></span> ${tr('tr_ing')}`;

  try {
    const text = `${item.headline||''}. ${item.summary||''}`.trim().substring(0,1000);
    const url  = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error('http');
    const data = await res.json();
    const out  = data[0].map(s => s[0]).join('');
    if (!out) throw new Error('empty');
    pEl.textContent = out; pEl.classList.add('translated');
    btn.classList.add('is-on'); btn.disabled = false;
    btn.querySelector('.tr-lbl').textContent = tr('tr_orig');
  } catch {
    btn.disabled = false;
    btn.querySelector('.tr-lbl').textContent = '↺ 失敗，點擊重試';
  }
}
</script>
