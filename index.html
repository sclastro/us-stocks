<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLens — 股票即時查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f9f9f8;
  --surface:#ffffff;
  --surface2:#fafaf9;
  --border:#e5e5e3;
  --border2:#d5d5d2;
  --t1:#1a1a1a;
  --t2:#3d3d3d;
  --t3:#6b7280;
  --t4:#9ca3af;
  --accent:#d97706;
  --accent-d:#b45309;
  --accent-l:rgba(217,119,6,.09);
  --green:#16a34a;
  --green-l:#dcfce7;
  --red:#dc2626;
  --red-l:#fee2e2;
  --sh:0 1px 2px rgba(0,0,0,.05),0 1px 4px rgba(0,0,0,.06);
  --r:12px;
  --rs:8px;
}

html{font-size:16px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Header ─────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:rgba(249,249,248,.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.hdr-in{max-width:1100px;margin:0 auto;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--t1)}
.brand-ico{width:28px;height:28px;background:var(--accent);border-radius:6px;display:grid;place-items:center;font-size:14px;flex-shrink:0;color:#fff}
.brand-nm{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr-pill{
  font-size:11.5px;font-weight:500;color:var(--t3);
  padding:3px 10px;border:1px solid var(--border2);border-radius:20px;letter-spacing:.1px;
}
@media(max-width:480px){.hdr-pill{display:none}}

/* ── Main ───────────────────────────────── */
.main{max-width:1100px;margin:0 auto;padding:44px 24px 80px}
@media(max-width:600px){.main{padding:28px 16px 60px}}

/* ── Hero ───────────────────────────────── */
.hero{text-align:center;padding:8px 0 44px}
.hero h1{font-size:30px;font-weight:700;letter-spacing:-.8px;margin-bottom:10px;line-height:1.2;color:var(--t1)}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{font-size:14.5px;color:var(--t3);margin-bottom:28px}
@media(max-width:600px){.hero h1{font-size:23px}}

.search-row{display:flex;max-width:480px;margin:0 auto 20px;gap:8px}
.sym-input{
  flex:1;min-width:0;padding:11px 16px;
  background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rs);
  font-family:inherit;font-size:15px;font-weight:600;color:var(--t1);outline:none;
  transition:border-color .15s,box-shadow .15s;letter-spacing:.4px;
  box-shadow:var(--sh);
}
.sym-input::placeholder{color:var(--t4);font-weight:400;letter-spacing:0}
.sym-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l)}
.srch-btn{
  padding:11px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);
  font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;
  transition:background .15s,transform 80ms;white-space:nowrap;flex-shrink:0;
  box-shadow:0 1px 2px rgba(0,0,0,.1);
}
.srch-btn:hover:not(:disabled){background:var(--accent-d)}
.srch-btn:active:not(:disabled){transform:scale(.97)}
.srch-btn:disabled{background:var(--t4);cursor:not-allowed;box-shadow:none}

.quick-row{display:flex;justify-content:center;flex-wrap:wrap;gap:6px}
.qtick{
  padding:4px 12px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;
  transition:all .15s;letter-spacing:.4px;box-shadow:var(--sh);
}
.qtick:hover{background:var(--accent-l);border-color:var(--accent);color:var(--accent)}

/* ── Error state ────────────────────────── */
.state-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:60px 24px;text-align:center;box-shadow:var(--sh)}
.state-ico{font-size:32px;margin-bottom:14px}
.state-ttl{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:6px}
.state-desc{font-size:13.5px;color:var(--t4);max-width:380px;margin:0 auto;line-height:1.65;white-space:pre-wrap}

/* ── Skeleton shimmer ───────────────────── */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.sk{
  display:inline-block;vertical-align:middle;
  background:linear-gradient(90deg,#efefed 25%,#e5e5e3 50%,#efefed 75%);
  background-size:1200px 100%;
  animation:shimmer 1.6s infinite linear;
}

/* ── Cards ──────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
.card+.card{margin-top:14px}
.cb{padding:24px}
.ch{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:20px 24px 0}
.card-ttl{font-size:12px;font-weight:700;color:var(--t4);letter-spacing:.8px;text-transform:uppercase}
@media(max-width:600px){.cb,.ch{padding-left:16px;padding-right:16px}}

/* ── Quote card ─────────────────────────── */
.q-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:22px}
@media(max-width:500px){.q-top{flex-direction:column}}
.stk-id .sym{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.stk-id .nm{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.2;color:var(--t1)}
.stk-id .sec{font-size:13px;color:var(--t3);margin-top:4px}
@media(max-width:600px){.stk-id .nm{font-size:18px}}
.price-area{text-align:right}
@media(max-width:500px){.price-area{text-align:left}}
.price-main{font-size:38px;font-weight:700;letter-spacing:-1.5px;line-height:1;color:var(--t1);min-height:38px}
@media(max-width:600px){.price-main{font-size:30px}}
.price-delta{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:600;margin-top:8px;padding:4px 10px;border-radius:6px;min-height:30px}
.price-delta.up{color:var(--green);background:var(--green-l)}
.price-delta.down{color:var(--red);background:var(--red-l)}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-top:2px}
@media(min-width:520px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:760px){.stats-grid{grid-template-columns:repeat(6,1fr)}}
.stat{background:var(--surface);padding:14px 16px}
.stat:hover{background:var(--surface2)}
.stat-k{font-size:10.5px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.stat-v{font-size:15px;font-weight:600;color:var(--t1);min-height:22px;display:flex;align-items:center}

/* ── Chart card ─────────────────────────── */
.period-grp{display:flex;flex-wrap:wrap;gap:4px}
.per-btn{
  padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);font-family:inherit;font-size:12.5px;font-weight:600;
  color:var(--t3);cursor:pointer;transition:all .15s;letter-spacing:.1px;
}
.per-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.per-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chart-wrap{position:relative;padding:14px 24px 24px}
.tv-chart{display:block;width:100%;height:420px;border:none;border-radius:var(--rs);transition:opacity .25s}
.tv-chart.tv-loading{opacity:0}
.chart-loader{
  position:absolute;inset:14px 24px 24px;border-radius:var(--rs);
  background:var(--surface2);border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  font-size:13.5px;color:var(--t3);pointer-events:none;
}
.chart-loader[hidden]{display:none!important}
.chart-spin{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .chart-wrap{padding:14px 16px 16px}
  .tv-chart{height:300px}
  .chart-loader{inset:14px 16px 16px}
}

/* ── News card ──────────────────────────── */
.news-hdr{padding:18px 24px 16px;border-bottom:1px solid var(--border)}
@media(max-width:600px){.news-hdr{padding:14px 16px}}
.news-item{padding:17px 24px;border-bottom:1px solid var(--border);transition:background .12s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:var(--surface2)}
@media(max-width:600px){.news-item{padding:14px 16px}}
.n-top{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:6px}
.n-src{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.n-dot{width:3px;height:3px;border-radius:50%;background:var(--t4);flex-shrink:0}
.n-date{font-size:11.5px;color:var(--t4)}
.n-title{font-size:14.5px;font-weight:600;line-height:1.45;margin-bottom:6px}
.n-title a{color:var(--t1);text-decoration:none}
.n-title a:hover{color:var(--accent)}
.n-sum{font-size:13.5px;color:var(--t3);line-height:1.65;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.n-tr{
  margin:8px 0;padding:12px 14px;
  background:var(--accent-l);border-left:2.5px solid var(--accent);
  border-radius:0 6px 6px 0;font-size:13.5px;color:var(--t2);line-height:1.65;display:none;
}
.n-tr-lbl{font-size:10.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.tr-btn{
  display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
  background:var(--surface);border:1px solid var(--border2);border-radius:6px;
  font-family:inherit;font-size:12.5px;font-weight:500;color:var(--t3);cursor:pointer;
  transition:all .15s;box-shadow:var(--sh);
}
.tr-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.tr-btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.mini-spin{display:inline-block;width:10px;height:10px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}

[hidden]{display:none!important}
</style>
</head>
<body>

<!-- ═══ HEADER ══════════════════════════════════════ -->
<header class="hdr">
  <div class="hdr-in">
    <a class="brand" href="javascript:location.reload()">
      <div class="brand-ico">📈</div>
      <span class="brand-nm">StockLens</span>
    </a>
    <span class="hdr-pill">Powered by Finnhub</span>
  </div>
</header>

<!-- ═══ MAIN ═════════════════════════════════════════ -->
<main class="main">

  <!-- Search hero -->
  <section class="hero">
    <h1>股票<em>即時</em>查詢</h1>
    <p>輸入股票代碼，獲取 K 線圖、實時行情及最新新聞</p>
    <div class="search-row">
      <input id="sym-input" class="sym-input" type="text"
        placeholder="輸入代碼，例如 AAPL"
        autocomplete="off" spellcheck="false">
      <button id="srch-btn" class="srch-btn" onclick="doSearch()">查詢</button>
    </div>
    <div class="quick-row">
      <span class="qtick" onclick="qs('AAPL')">AAPL</span>
      <span class="qtick" onclick="qs('TSLA')">TSLA</span>
      <span class="qtick" onclick="qs('GOOGL')">GOOGL</span>
      <span class="qtick" onclick="qs('MSFT')">MSFT</span>
      <span class="qtick" onclick="qs('NVDA')">NVDA</span>
      <span class="qtick" onclick="qs('AMZN')">AMZN</span>
      <span class="qtick" onclick="qs('META')">META</span>
    </div>
  </section>

  <!-- Error -->
  <div id="st-err" hidden>
    <div class="state-card">
      <div class="state-ico">⚠️</div>
      <div class="state-ttl">查詢失敗</div>
      <div class="state-desc" id="err-msg"></div>
    </div>
  </div>

  <!-- Results (shown immediately with skeletons on search) -->
  <div id="results" hidden>

    <!-- Quote -->
    <div class="card">
      <div class="cb">
        <div class="q-top">
          <div class="stk-id">
            <div class="sym"  id="r-sym"></div>
            <div class="nm"   id="r-name"></div>
            <div class="sec"  id="r-sec"></div>
          </div>
          <div class="price-area">
            <div class="price-main"  id="r-price"></div>
            <div class="price-delta" id="r-delta"></div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat"><div class="stat-k">今日最高</div><div class="stat-v" id="r-high"></div></div>
          <div class="stat"><div class="stat-k">今日最低</div><div class="stat-v" id="r-low"></div></div>
          <div class="stat"><div class="stat-k">開市價</div>  <div class="stat-v" id="r-open"></div></div>
          <div class="stat"><div class="stat-k">昨日收市</div><div class="stat-v" id="r-prev"></div></div>
          <div class="stat"><div class="stat-k">成交量</div>  <div class="stat-v" id="r-vol"></div></div>
          <div class="stat"><div class="stat-k">市值</div>    <div class="stat-v" id="r-cap"></div></div>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card">
      <div class="ch">
        <span class="card-ttl">K 線走勢</span>
        <div class="period-grp">
          <button class="per-btn active" onclick="switchPeriod('1M',this)">1M</button>
          <button class="per-btn"        onclick="switchPeriod('3M',this)">3M</button>
          <button class="per-btn"        onclick="switchPeriod('6M',this)">6M</button>
          <button class="per-btn"        onclick="switchPeriod('1Y',this)">1Y</button>
          <button class="per-btn"        onclick="switchPeriod('3Y',this)">3Y</button>
          <button class="per-btn"        onclick="switchPeriod('5Y',this)">5Y</button>
        </div>
      </div>
      <div class="chart-wrap">
        <div id="tv-loader" class="chart-loader">
          <div class="chart-spin"></div>
          <span>圖表載入中…</span>
        </div>
        <iframe id="tv-chart" class="tv-chart tv-loading" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
      </div>
    </div>

    <!-- News -->
    <div class="card">
      <div class="news-hdr"><span class="card-ttl">最新新聞</span></div>
      <div id="news-list"></div>
    </div>

  </div><!-- /#results -->

</main>

<!-- ═══ JAVASCRIPT ════════════════════════════════════ -->
<script>
'use strict';

/* ── Config ──────────────────────────────────────── */
const FH_KEY  = 'd806uhhr01qj3ct99a30d806uhhr01qj3ct99a3g';
const FH_BASE = 'https://finnhub.io/api/v1';

/* ── State ───────────────────────────────────────── */
const $ = id => document.getElementById(id);
let newsData     = [];
let activePeriod = '1M';
let currentSym   = '';

/* ── Boot ────────────────────────────────────────── */
$('sym-input').addEventListener('input',   e => { e.target.value = e.target.value.toUpperCase(); });
$('sym-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

/* ── Helpers ─────────────────────────────────────── */
const fmt$ = n => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

function fmtVol(n) {
  n = parseInt(n);
  return n>=1e9?(n/1e9).toFixed(2)+'B' : n>=1e6?(n/1e6).toFixed(2)+'M' : n>=1e3?(n/1e3).toFixed(1)+'K' : n.toString();
}

function fmtCap(millions) {
  const n = parseFloat(millions) * 1e6;
  if (!n || isNaN(n)) return '—';
  return n>=1e12?'$'+(n/1e12).toFixed(2)+'T' : n>=1e9?'$'+(n/1e9).toFixed(2)+'B' : n>=1e6?'$'+(n/1e6).toFixed(2)+'M' : '$'+n;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function tsToDate(ts) {
  return new Date(ts * 1000).toISOString().slice(0, 10);
}

/* ── Finnhub API ─────────────────────────────────── */
async function fhFetch(path) {
  const sep = path.includes('?') ? '&' : '?';
  const res  = await fetch(`${FH_BASE}/${path}${sep}token=${FH_KEY}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) {
    if (data.error.toLowerCase().includes('invalid')) throw new Error('Finnhub API Key 無效。');
    if (data.error.toLowerCase().includes('limit'))   throw new Error('已達 Finnhub 請求上限。');
    throw new Error(data.error);
  }
  return data;
}

/* ── News with auto-retry on empty ──────────────── */
async function fetchNews(sym) {
  const now = Math.floor(Date.now() / 1000);
  const to  = tsToDate(now);

  // First attempt: 60 days
  try {
    const data = await fhFetch(`company-news?symbol=${sym}&from=${tsToDate(now - 60*86400)}&to=${to}`);
    if (Array.isArray(data) && data.length > 0) return data;
  } catch { /* fall through */ }

  // Auto-retry: extend to 180 days
  try {
    const data = await fhFetch(`company-news?symbol=${sym}&from=${tsToDate(now - 180*86400)}&to=${to}`);
    if (Array.isArray(data) && data.length > 0) return data;
  } catch { /* fall through */ }

  return [];
}

/* ── Skeleton helpers ────────────────────────────── */
// Inline shimmer block: width, height, corner-radius
const sk = (w, h, r = '4px') =>
  `<span class="sk" style="width:${w};height:${h};border-radius:${r}"></span>`;

// Block-level shimmer line
const skb = (w, h = '14px', mb = '8px') =>
  `<div class="sk" style="display:block;width:${w};height:${h};border-radius:4px;margin-bottom:${mb}"></div>`;

function showQuoteSkeleton() {
  $('r-sym').innerHTML   = sk('46px', '11px', '3px');
  $('r-name').innerHTML  = sk('190px', '22px');
  $('r-sec').innerHTML   = sk('130px', '12px', '3px');
  $('r-price').innerHTML = sk('155px', '38px');
  const d = $('r-delta');
  d.className = 'price-delta';
  d.innerHTML = sk('105px', '22px', '6px');
  ['r-high','r-low','r-open','r-prev','r-vol','r-cap'].forEach(id =>
    $(id).innerHTML = sk('68px', '14px')
  );
}

function showNewsSkeleton() {
  $('news-list').innerHTML = Array(3).fill(0).map(() => `
    <div class="news-item" style="pointer-events:none;user-select:none">
      <div class="n-top" style="margin-bottom:10px">
        ${sk('58px','10px','3px')}
        ${sk('82px','10px','3px')}
      </div>
      ${skb('86%','15px','6px')}
      ${skb('68%','15px','6px')}
      ${skb('48%','12px','0')}
    </div>`).join('');
}

/* ── Search ──────────────────────────────────────── */
const qs = sym => { $('sym-input').value = sym; doSearch(); };

async function doSearch() {
  const sym = $('sym-input').value.trim().toUpperCase();
  if (!sym) return;

  currentSym   = sym;
  newsData     = [];
  activePeriod = '1M';

  // Disable button
  const btn = $('srch-btn');
  btn.disabled    = true;
  btn.textContent = '查詢中…';

  // ① Show results immediately with skeletons
  $('st-err').hidden  = true;
  $('results').hidden = false;
  showQuoteSkeleton();
  showNewsSkeleton();

  // Reset period buttons; show chart loader at once
  document.querySelectorAll('.per-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.per-btn').classList.add('active');
  $('tv-loader').hidden = false;
  $('tv-chart').classList.add('tv-loading');
  $('tv-chart').onload = null;
  $('tv-chart').src = '';

  // ② Fire all fetches simultaneously
  const quoteP   = fhFetch(`quote?symbol=${sym}`);
  const profileP = fhFetch(`stock/profile2?symbol=${sym}`).catch(() => ({}));
  const newsP    = fetchNews(sym);

  // ③ Quote + Profile → render quote card first (fast path)
  let quote, profile;
  try {
    [quote, profile] = await Promise.all([quoteP, profileP]);
    if (!quote.pc || quote.pc === 0) {
      throw new Error(`找不到股票代碼「${sym}」。\n請確認代碼是否正確（例如 AAPL、TSLA、GOOGL）`);
    }
  } catch (err) {
    $('results').hidden = true;
    $('st-err').hidden  = false;
    $('err-msg').textContent = err.message || '查詢失敗，請稍後再試';
    btn.disabled    = false;
    btn.textContent = '查詢';
    return;
  }

  renderQuote(quote, profile, sym);
  updateTVChart();               // ← chart starts loading now
  btn.disabled    = false;
  btn.textContent = '查詢';

  // ④ News renders whenever it's ready (non-blocking)
  try {
    const news = await newsP;
    if (currentSym === sym) { newsData = news; renderNews(); }
  } catch {
    if (currentSym === sym) renderNews();
  }
}

/* ── Render: Quote ───────────────────────────────── */
function renderQuote(q, p, sym) {
  const isUp = (q.d || 0) >= 0;

  $('r-sym').textContent   = sym;
  $('r-name').textContent  = p.name || sym;
  $('r-sec').textContent   = [p.finnhubIndustry, p.exchange].filter(Boolean).join(' · ');
  $('r-price').textContent = fmt$(q.c);

  const d = $('r-delta');
  d.textContent = `${isUp?'▲':'▼'} ${Math.abs(q.d||0).toFixed(2)}  (${Math.abs(q.dp||0).toFixed(2)}%)`;
  d.className   = 'price-delta ' + (isUp ? 'up' : 'down');

  $('r-high').textContent = fmt$(q.h);
  $('r-low').textContent  = fmt$(q.l);
  $('r-open').textContent = fmt$(q.o);
  $('r-prev').textContent = fmt$(q.pc);
  $('r-vol').textContent  = '—';
  $('r-cap').textContent  = p.marketCapitalization ? fmtCap(p.marketCapitalization) : '—';
}

/* ── Chart (TradingView Widget) ──────────────────── */
const TV_RANGE    = {'1M':'1M',  '3M':'3M',  '6M':'6M',  '1Y':'12M', '3Y':'36M', '5Y':'60M'};
const TV_INTERVAL = {'1M':'D',   '3M':'D',   '6M':'D',   '1Y':'W',   '3Y':'W',   '5Y':'M'  };

function buildTVUrl(sym, period) {
  const p = new URLSearchParams({
    symbol:              sym,
    interval:            TV_INTERVAL[period] || 'D',
    range:               TV_RANGE[period]    || '1M',
    theme:               'light',
    style:               '1',
    locale:              'zh_TW',
    timezone:            'Asia/Hong_Kong',
    toolbar_bg:          'ffffff',
    hide_side_toolbar:   '0',
    allow_symbol_change: '1',
    save_image:          '0',
    hideideas:           '1',
    hide_top_toolbar:    '0',
  });
  return 'https://www.tradingview.com/widgetembed/?' + p.toString();
}

function updateTVChart() {
  if (!currentSym) return;
  const sym    = currentSym;
  const frame  = $('tv-chart');
  const loader = $('tv-loader');
  loader.hidden = false;
  frame.classList.add('tv-loading');
  frame.onload = () => {
    if (currentSym !== sym) return;  // stale load — ignore
    frame.classList.remove('tv-loading');
    loader.hidden = true;
  };
  frame.src = buildTVUrl(sym, activePeriod);
}

function switchPeriod(period, btn) {
  activePeriod = period;
  document.querySelectorAll('.per-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateTVChart();
}

/* ── Render: News ────────────────────────────────── */
function renderNews() {
  const el = $('news-list');
  if (!newsData.length) {
    el.innerHTML = `
      <div style="padding:32px 24px;text-align:center;color:var(--t4);font-size:13.5px;line-height:1.7">
        暫時未有最新新聞，請稍後再試
      </div>`;
    return;
  }
  el.innerHTML = newsData.slice(0, 10).map((item, i) => {
    const date       = tsToDate(item.datetime);
    const hasSummary = !!(item.summary?.trim() && item.summary !== item.headline);
    return `
<div class="news-item">
  <div class="n-top">
    <span class="n-src">${esc(item.source||'')}</span>
    <span class="n-dot"></span>
    <span class="n-date">${date}</span>
  </div>
  <div class="n-title">
    <a href="${esc(item.url||'#')}" target="_blank" rel="noopener noreferrer">${esc(item.headline||'')}</a>
  </div>
  ${hasSummary ? `<div class="n-sum">${esc(item.summary)}</div>` : ''}
  <div class="n-tr" id="ntr-${i}">
    <div class="n-tr-lbl">繁體中文翻譯</div>
    <div id="ntr-txt-${i}"></div>
  </div>
  ${hasSummary ? `<button class="tr-btn" id="ntr-btn-${i}" onclick="doTranslate(${i})">🌐 翻譯成繁體中文</button>` : ''}
</div>`;
  }).join('');
}

/* ── Translate (Google Translate unofficial) ─────── */
async function doTranslate(i) {
  const item  = newsData[i];
  const text  = `${item.headline||''}. ${item.summary||''}`.trim().substring(0, 1000);
  const btn   = $(`ntr-btn-${i}`);
  const box   = $(`ntr-${i}`);
  const txtEl = $(`ntr-txt-${i}`);

  btn.disabled  = true;
  btn.innerHTML = '<span class="mini-spin"></span> 翻譯中…';

  try {
    const url  = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const translated = data[0].map(seg => seg[0]).join('');
    if (!translated) throw new Error('空白回應');

    txtEl.textContent = translated;
    box.style.display = 'block';
    btn.innerHTML     = '✓ 已翻譯';
    btn.style.cssText += ';color:var(--green);border-color:var(--green);background:var(--green-l)';
  } catch {
    btn.disabled  = false;
    btn.innerHTML = '↺ 翻譯失敗，點擊重試';
    btn.style.color = 'var(--red)';
  }
}
</script>
