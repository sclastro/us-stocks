<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.detail-back{margin:0 0 20px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);text-decoration:none;padding:6px 10px;border-radius:8px;transition:all .15s}
.back-link:hover{color:var(--ink);background:var(--surface-2)}
.chart-type-wrap{display:flex;gap:6px}
.ct-btn{padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.ct-btn.active{background:var(--accent,#3b82f6);color:#fff;border-color:var(--accent,#3b82f6)}
</style>
<script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="quote.html">
      <div class="logo-mark" aria-hidden="true"></div>
      <span><b>Stock</b><span class="dim">Lens</span></span>
    </a>
    <div class="nav-tabs">
      <a href="quote.html"     class="nav-tab" id="nav-quote"   data-i18n="nav_quote">股票查詢</a>
      <a href="etf.html"       class="nav-tab" id="nav-etf"    data-i18n="nav_etf">ETF</a>
      <a href="indices.html"   class="nav-tab" id="nav-indices" data-i18n="nav_indices">環球指數</a>
      <a href="watchlist.html" class="nav-tab">
        <span data-i18n="nav_watchlist">自選清單</span> <span class="wl-badge" id="wlBadge" hidden>0</span>
      </a>
      <a href="portfolio.html" class="nav-tab" data-i18n="nav_portfolio">持倉</a>
    </div>
    <div class="nav-right">
      <span class="mkt-pill"><span class="dot"></span><span data-i18n="market_open">市場開市</span></span>
      <div class="lang-toggle" id="langToggle">
        <button type="button" data-lang="zh">繁中</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <span class="nav-powered" id="navPowered"><span data-i18n="powered_by">技術提供</span> <b id="poweredSrc">Finnhub</b></span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="detail-back">
    <a href="javascript:history.back()" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      <span id="backLabel">返回</span>
    </a>
  </div>

  <!-- Error -->
  <div id="st-err" hidden>
    <div class="state-card">
      <div class="state-ico">⚠️</div>
      <div class="state-ttl" data-i18n="err_title">查詢失敗</div>
      <div class="state-desc" id="err-msg"></div>
    </div>
  </div>

  <!-- Results grid -->
  <div id="results" class="grid" hidden>

    <!-- LEFT: quote + chart -->
    <div class="left-col">

      <!-- Stock card -->
      <div class="card">
        <div class="stock-head" id="stock-head">
          <div class="stock-head-top">
            <div class="stock-id">
              <div class="stock-logo" id="stock-logo">--</div>
              <div class="stock-meta">
                <h2>
                  <span class="sym" id="r-sym"></span>
                  <span class="nm"  id="r-name"></span>
                </h2>
                <div class="stock-tags">
                  <span id="r-exchange"></span>
                  <span id="r-sec"></span>
                  <span id="r-currency"></span>
                </div>
              </div>
            </div>
            <div class="mkt-state">
              <div class="live-ind" data-i18n="live">即時</div>
              <div class="live-time" id="live-time"></div>
            </div>
          </div>
          <div class="price-line">
            <span class="price-main" id="r-price"></span>
            <span class="price-delta" id="r-delta"></span>
            <button class="watch-btn" id="watchBtn" type="button" aria-pressed="false" hidden>
              <svg class="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <span class="watch-label" data-i18n="add_watch">加入自選</span>
            </button>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="k" data-i18n="k_open">開盤</div><div class="v" id="r-open">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_hl">最高 · 最低</div><div class="v" id="r-hl">—</div><div class="sub" id="r-hl-sub"></div></div>
          <div class="stat"><div class="k" data-i18n="k_vol">成交量</div><div class="v" id="r-vol">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_cap">市值</div><div class="v" id="r-cap">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_52w">52 週區間</div><div class="v" id="r-52">—</div><div class="sub" id="r-52pos"></div></div>
        </div>
      </div>

      <!-- Chart card -->
      <div class="card" id="chartCard">
        <div class="chart-head">
          <h3>
            <span data-i18n="chart_title">價格走勢</span>
            <span class="chart-badge" id="chart-badge">1M · 日線</span>
          </h3>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <div class="chart-type-wrap">
              <button class="ct-btn active" data-type="candlestick" onclick="switchChartType('candlestick')">K線</button>
              <button class="ct-btn" data-type="line" onclick="switchChartType('line')">線圖</button>
            </div>
            <div class="timeframes">
              <button class="tf-btn active" data-period="1M">1M</button>
              <button class="tf-btn"        data-period="3M">3M</button>
              <button class="tf-btn"        data-period="6M">6M</button>
              <button class="tf-btn"        data-period="1Y">1Y</button>
              <button class="tf-btn"        data-period="3Y">3Y</button>
              <button class="tf-btn"        data-period="5Y">5Y</button>
            </div>
          </div>
        </div>
        <div class="chart-wrap">
          <div id="chart-loader" class="chart-loader">
            <div class="chart-spin"></div>
            <span data-i18n="chart_loading">圖表載入中…</span>
          </div>
          <div id="lw-chart"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: news (stock/etf only) -->
    <aside class="card news-card" id="newsCard" hidden>
      <div class="news-head">
        <h3>
          <span data-i18n="latest_news">最新新聞</span>
          <span class="n-count" id="newsCount">0</span>
        </h3>
      </div>
      <div class="news-list" id="news-list"></div>
    </aside>

  </div><!-- /#results -->
</main>

<footer>
  <div data-i18n="footer_left">StockLens · 僅供研究及教育用途，不構成投資建議。</div>
  <div><span data-i18n="footer_delay">報價延遲約 15 分鐘</span> · <a href="#" data-i18n="footer_terms">服務條款</a></div>
</footer>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <a href="quote.html"     class="bn-item" id="bn-quote">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <span>查詢</span>
  </a>
  <a href="etf.html"       class="bn-item" id="bn-etf">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>ETF</span>
  </a>
  <a href="indices.html"   class="bn-item" id="bn-indices">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 0 1 0 18M3 12h18"/></svg>
    <span>指數</span>
  </a>
  <a href="watchlist.html" class="bn-item">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>自選</span>
  </a>
  <a href="portfolio.html" class="bn-item">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    <span>持倉</span>
  </a>
</nav>

<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script>
'use strict';

/* ── URL Params ──────────────────────────────────── */
const urlParams = new URLSearchParams(window.location.search);
const sym       = (urlParams.get('symbol') || '').toUpperCase();
const symType   = urlParams.get('type') || 'stock'; // stock | etf | index | forex | commodity
const symName   = urlParams.get('name') || sym;

/* ── State ───────────────────────────────────────── */
const $ = id => document.getElementById(id);
let newsData     = [];
let activePeriod = '1M';

const isYahoo = symType === 'index' || symType === 'forex' || symType === 'commodity';

/* ── Nav active state ────────────────────────────── */
if (isYahoo) {
  $('nav-indices').classList.add('active');
  $('bn-indices').classList.add('active');
  $('poweredSrc').textContent = 'Yahoo Finance';
} else if (symType === 'etf') {
  $('nav-etf').classList.add('active');
  $('bn-etf').classList.add('active');
} else {
  $('nav-quote').classList.add('active');
  $('bn-quote').classList.add('active');
}


/* ── Boot ────────────────────────────────────────── */
applyLang();
updateWlBadge();
tick(); setInterval(tick, 1000);

document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => {
    setLang(b.dataset.lang);
    if (!isYahoo) syncWatchBtn();
    renderNews();
    updateChartBadge();
  });
});

document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => switchPeriod(btn.dataset.period, btn));
});

$('watchBtn').addEventListener('click', () => {
  if (watchlist.has(sym)) {
    watchlist.delete(sym);
  } else {
    const btn = $('watchBtn');
    watchlist.add(sym);
    btn.classList.remove('pop');
    void btn.offsetWidth;
    btn.classList.add('pop');
  }
  saveWatchlist();
  syncWatchBtn();
  updateWlBadge();
});

/* ── Main init ───────────────────────────────────── */
if (!sym) {
  showError('缺少股票代碼，請從搜尋頁面進入。');
} else if (isYahoo) {
  loadYahoo();
} else {
  loadFinnhub();
}

/* ── Clock ───────────────────────────────────────── */
function tick() {
  const d  = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  const el = $('live-time');
  if (el) el.textContent = `${hh}:${mm}:${ss}`;
}

/* ── Error ───────────────────────────────────────── */
function showError(msg) {
  $('st-err').hidden  = false;
  $('results').hidden = true;
  $('err-msg').textContent = msg;
}

/* ── Finnhub loader (stock / etf) ────────────────── */
async function loadFinnhub() {
  document.title   = `StockLens — ${sym}`;
  $('results').hidden = false;
  $('watchBtn').hidden = false;
  $('newsCard').hidden = false;
  showQuoteSkeleton();
  showNewsSkeleton();

  const quoteP   = API.getQuote(sym);
  const profileP = API.getCompanyProfile(sym).catch(() => ({}));
  const metricP  = API.getMetrics(sym).catch(() => ({}));
  const newsP    = API.getNews(sym);

  try {
    const [quote, profile, metric] = await Promise.all([quoteP, profileP, metricP]);
    if (!quote.pc || quote.pc === 0) throw new Error('empty');
    renderQuote(quote, profile, metric);
    syncWatchBtn();
    updateLWChart();
    try { newsData = await newsP; renderNews(); } catch { renderNews(); }
  } catch (finnhubErr) {
    if (symType === 'etf') {
      /* Finnhub failed — try Yahoo Finance as fallback */
      $('newsCard').hidden = true;
      try {
        const data = await API.getIndexQuote(sym);
        renderIndexQuote(data);
        syncWatchBtn();
        updateLWChart();
      } catch {
        showError(`查詢失敗，Finnhub 及 Yahoo Finance 均無法取得 ${sym} 的數據`);
      }
    } else {
      const msg = finnhubErr.message === 'empty'
        ? `找不到「${sym}」。\n請確認代碼是否正確（例如 AAPL、TSLA、GOOGL）`
        : (finnhubErr.message || '查詢失敗，請稍後再試');
      showError(msg);
    }
  }
}

/* ── Yahoo loader (index / forex / commodity) ────── */
async function loadYahoo() {
  document.title  = `StockLens — ${symName}`;
  $('results').hidden = false;
  $('watchBtn').hidden = true;
  $('newsCard').hidden = true;
  showQuoteSkeleton();

  try {
    const data = await API.getIndexQuote(sym);
    renderIndexQuote(data);
    updateLWChart();
  } catch (err) {
    showError(err.message || '查詢失敗，請稍後再試');
  }
}

/* ── Render: stock / etf (Finnhub) ───────────────── */
function renderQuote(q, p, m) {
  const isUp = (q.d || 0) >= 0;
  const tint = TINTS[sym] || DEFAULT_TINT;

  $('stock-logo').textContent = sym.slice(0,2);
  const sh = $('stock-head');
  sh.style.setProperty('--stock-fg', tint.fg);
  sh.style.setProperty('--stock-bg', tint.bg);
  sh.style.setProperty('--stock-bd', tint.bd);

  $('r-sym').textContent      = sym;
  $('r-name').textContent     = p.name || symName || sym;
  $('r-exchange').textContent = p.exchange        || '—';
  $('r-sec').textContent      = p.finnhubIndustry || '—';
  $('r-currency').textContent = p.currency        || 'USD';

  $('r-price').textContent = fmt$(q.c);

  const d = $('r-delta');
  d.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="${isUp?'m5 15 7-7 7 7':'m5 9 7 7 7-7'}"/></svg>${isUp?'+':''}${Math.abs(q.d||0).toFixed(2)} (${isUp?'+':''}${Math.abs(q.dp||0).toFixed(2)}%)`;
  d.className = 'price-delta ' + (isUp ? 'up' : 'down');

  $('r-open').textContent   = fmt$(q.o);
  $('r-hl').textContent     = `${fmt$(q.h)} / ${fmt$(q.l)}`;
  $('r-hl-sub').textContent = `Range $${(q.h - q.l).toFixed(2)}`;
  $('r-vol').textContent    = '—';
  $('r-cap').textContent    = p.marketCapitalization ? fmtCap(p.marketCapitalization) : '—';

  const h52 = m?.metric?.['52WeekHigh'];
  const l52 = m?.metric?.['52WeekLow'];
  if (h52 && l52) {
    $('r-52').textContent    = `${h52.toFixed(2)} — ${l52.toFixed(2)}`;
    const pos = Math.round(100 * (q.c - l52) / (h52 - l52));
    $('r-52pos').textContent = `${Math.max(0,Math.min(100,pos))}${tr('of_range')}`;
  } else {
    $('r-52').textContent    = '—';
    $('r-52pos').textContent = '';
  }
}

/* ── Render: index / forex / commodity (Yahoo) ───── */
function fmtIdxPrice(price, s) {
  if (typeof price !== 'number' || isNaN(price)) return '—';
  if (s.endsWith('=X')) return price.toFixed(4);
  return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtIdxChange(change, s) {
  if (typeof change !== 'number' || isNaN(change)) return '—';
  const sign = change >= 0 ? '+' : '';
  if (s.endsWith('=X')) return sign + change.toFixed(4);
  const str = Math.abs(change).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (change >= 0 ? '+' : '-') + str;
}
function fmtVol(v) {
  if (!v || isNaN(v)) return '—';
  if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
  return String(v);
}

function renderIndexQuote(data) {
  const initials = sym.replace(/[^A-Za-z0-9]/g, '').slice(0,2).toUpperCase() || '--';
  $('stock-logo').textContent = initials;

  const sh = $('stock-head');
  sh.style.setProperty('--stock-fg', 'var(--ink-2)');
  sh.style.setProperty('--stock-bg', 'var(--surface-2)');
  sh.style.setProperty('--stock-bd', 'var(--border)');

  $('r-sym').textContent  = sym;
  $('r-name').textContent = symName || data.shortName || sym;

  const mktLbl = { REGULAR:'開市', PRE:'盤前', POST:'盤後', POSTPOST:'盤後', CLOSED:'收市' };
  $('r-exchange').textContent = mktLbl[data.marketState] || '收市';
  $('r-sec').textContent      = '';
  $('r-currency').textContent = data.currency || '';

  $('r-price').textContent = fmtIdxPrice(data.price, sym);

  const d = $('r-delta');
  if (sym === '^VIX') {
    const hi = data.price > 20;
    d.className = 'price-delta neu';
    d.innerHTML = `<span>${hi ? '高波動 &gt;20' : '低波動 &lt;20'}</span>`;
  } else {
    const isUp  = (data.change || 0) >= 0;
    const arrow = isUp ? 'm5 15 7-7 7 7' : 'm5 9 7 7 7-7';
    const pct   = `${isUp ? '+' : ''}${(data.changePercent || 0).toFixed(2)}%`;
    const chg   = fmtIdxChange(data.change, sym);
    d.className = 'price-delta ' + (isUp ? 'up' : 'down');
    d.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="${arrow}"/></svg>${pct} (${chg})`;
  }

  $('r-open').textContent   = fmtIdxPrice(data.open, sym);
  $('r-hl').textContent     = (data.dayHigh && data.dayLow)
    ? `${fmtIdxPrice(data.dayHigh, sym)} / ${fmtIdxPrice(data.dayLow, sym)}` : '—';
  $('r-hl-sub').textContent = '';
  $('r-vol').textContent    = fmtVol(data.volume);
  $('r-cap').textContent    = '—';

  if (data.fiftyTwoWeekHigh && data.fiftyTwoWeekLow) {
    $('r-52').textContent    = `${fmtIdxPrice(data.fiftyTwoWeekHigh, sym)} — ${fmtIdxPrice(data.fiftyTwoWeekLow, sym)}`;
    const pos = Math.round(100 * (data.price - data.fiftyTwoWeekLow) / (data.fiftyTwoWeekHigh - data.fiftyTwoWeekLow));
    $('r-52pos').textContent = `${Math.max(0, Math.min(100, pos))}${tr('of_range')}`;
  } else {
    $('r-52').textContent    = '—';
    $('r-52pos').textContent = '';
  }
}

/* ── Skeletons ───────────────────────────────────── */
function showQuoteSkeleton() {
  $('r-sym').innerHTML   = sk('46px','11px','3px');
  $('r-name').innerHTML  = sk('160px','14px');
  $('r-price').innerHTML = sk('155px','38px');
  const d = $('r-delta'); d.className='price-delta'; d.innerHTML=sk('105px','22px','6px');
  ['r-open','r-hl','r-vol','r-cap','r-52'].forEach(id => { if ($(id)) $(id).innerHTML=sk('68px','14px'); });
  $('r-exchange').textContent=''; $('r-sec').textContent=''; $('r-currency').textContent='';
  $('r-hl-sub').textContent=''; $('r-52pos').textContent='';
  $('stock-logo').textContent='';
}
function showNewsSkeleton() {
  $('news-list').innerHTML = Array(5).fill(0).map(() => `
    <div class="news-item" style="pointer-events:none;user-select:none">
      <div class="news-meta" style="margin-bottom:8px">${sk('48px','9px','3px')} ${sk('60px','9px','3px')}</div>
      ${skb('90%','13px','4px')}${skb('72%','13px','4px')}${skb('50%','11px','0')}
    </div>`).join('');
}

/* ── Watchlist ───────────────────────────────────── */
function syncWatchBtn() {
  const btn = $('watchBtn');
  if (!btn || isYahoo) return;
  const on = watchlist.has(sym);
  btn.classList.toggle('is-on', on);
  btn.setAttribute('aria-pressed', String(on));
  btn.querySelector('.watch-label').textContent = on ? tr('on_watch') : tr('add_watch');
}

/* ── Chart (TradingView) ─────────────────────────── */
const TV_RANGE    = {'1M':'1M','3M':'3M','6M':'6M','1Y':'12M','3Y':'36M','5Y':'60M'};
const TV_INTERVAL = {'1M':'D', '3M':'D', '6M':'D', '1Y':'W',  '3Y':'W',  '5Y':'M' };

function buildTVUrl(tvSym, period) {
  const p = new URLSearchParams({
    symbol: tvSym, interval: TV_INTERVAL[period]||'D', range: TV_RANGE[period]||'1M',
    theme: 'light', style: '1', locale: 'zh_TW', timezone: 'Asia/Hong_Kong',
    toolbar_bg: 'ffffff', hide_side_toolbar: '0', allow_symbol_change: '1',
    save_image: '0', hideideas: '1', hide_top_toolbar: '0',
  });
  return 'https://www.tradingview.com/widgetembed/?' + p.toString();
}

function updateChartBadge() {
  const lbl = (activePeriod==='3Y'||activePeriod==='5Y') ? tr('weekly') : tr('daily');
  $('chart-badge').textContent = `${activePeriod} · ${lbl}`;
}

function updateTVChart() {
  const chartCard = $('chartCard');
  const noChart   = $('tv-no-chart');
  const frame     = $('tv-chart');
  const loader    = $('tv-loader');

  let tvSym;
  if (isYahoo) {
    tvSym = TV_SYMBOL_MAP[sym];
    if (!tvSym) {
      chartCard.hidden = false;
      loader.hidden    = true;
      frame.hidden     = true;
      noChart.hidden   = false;
      const tvBase = 'https://www.tradingview.com/chart/?symbol=';
      $('tv-ext-link').href = tvBase + encodeURIComponent(sym);
      updateChartBadge();
      return;
    }
  } else {
    tvSym = sym;
  }

  chartCard.hidden = false;
  noChart.hidden   = true;
  frame.hidden     = false;
  loader.hidden    = false;
  frame.classList.add('tv-loading');
  frame.onload = () => { frame.classList.remove('tv-loading'); loader.hidden = true; };
  frame.src = buildTVUrl(tvSym, activePeriod);
  updateChartBadge();
}

function switchPeriod(period, btn) {
  activePeriod = period;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateLWChart();
}

/* ── News (stock / etf only) ─────────────────────── */
function renderNews() {
  const el = $('news-list');
  if (!el) return;
  $('newsCount').textContent = newsData.length;
  if (!newsData.length) {
    el.innerHTML = `<div style="padding:28px 22px;text-align:center;color:var(--muted-2);font-size:13px;line-height:1.7">暫無最新新聞，請稍後再試</div>`;
    return;
  }
  const sl = {pos:tr('sent_pos'), neg:tr('sent_neg'), neu:tr('sent_neu')};
  el.innerHTML = newsData.slice(0,12).map((item,i) => {
    const date       = tsToDate(item.datetime);
    const hasSummary = !!(item.summary?.trim() && item.summary !== item.headline);
    const sent       = detectSentiment(item.headline, item.summary);
    return `
<div class="news-item">
  <div class="news-meta">
    <span class="n-src">${esc(item.source||'')}</span>
    <span class="n-dot"></span>
    <span>${date}</span>
    <span class="n-sent ${sent}">${sl[sent]}</span>
  </div>
  <div class="news-title">
    <a href="${esc(item.url||'#')}" target="_blank" rel="noopener noreferrer">${esc(item.headline||'')}</a>
  </div>
  ${hasSummary ? `<p class="news-summary" id="ns-${i}">${esc(item.summary)}</p>` : ''}
  <div class="news-actions">
    ${hasSummary ? `<button class="btn-ghost" id="ntr-${i}" onclick="doTranslate(${i})"><span class="tr-lbl">${tr('tr_btn')}</span></button>` : ''}
  </div>
</div>`;
  }).join('');
}

async function doTranslate(i) {
  const item = newsData[i];
  const btn  = $(`ntr-${i}`);
  const pEl  = $(`ns-${i}`);
  if (!btn || !pEl) return;

  if (btn.classList.contains('is-on')) {
    pEl.textContent = item.summary; pEl.className='news-summary';
    btn.classList.remove('is-on'); btn.querySelector('.tr-lbl').textContent = tr('tr_btn');
    return;
  }

  btn.disabled = true;
  btn.querySelector('.tr-lbl').innerHTML = `<span class="mini-spin"></span> ${tr('tr_ing')}`;

  try {
    const text = `${item.headline||''}. ${item.summary||''}`.trim().substring(0,1000);
    const url  = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error('http');
    const data = await res.json();
    const out  = data[0].map(s => s[0]).join('');
    if (!out) throw new Error('empty');
    pEl.textContent = out; pEl.classList.add('translated');
    btn.classList.add('is-on'); btn.disabled = false;
    btn.querySelector('.tr-lbl').textContent = tr('tr_orig');
  } catch {
    btn.disabled = false;
    btn.querySelector('.tr-lbl').textContent = '↺ 失敗，點擊重試';
  }
}
</script>
