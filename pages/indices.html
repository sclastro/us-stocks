function symType(sym) {
  if (sym.endsWith('=X')) return 'forex';
  if (sym.endsWith('=F')) return 'commodity';
  if (sym === 'URA')      return 'commodity';
  return 'index';
}

function symId(sym) {
  return sym.replace(/[^A-Za-z0-9]/g, '_');
}

/* Format price based on symbol type */
function fmtIdxPrice(price, sym) {
  if (typeof price !== 'number' || isNaN(price)) return '—';
  if (sym.endsWith('=X')) return price.toFixed(4);
  return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* Format absolute change */
function fmtChange(change, sym) {
  const sign = change >= 0 ? '+' : '';
  if (sym.endsWith('=X')) return sign + change.toFixed(4);
  const abs = Math.abs(change);
  const str = abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (change >= 0 ? '+' : '-') + str;
}

function buildChgHtml(price, change, changePct, sym) {
  if (typeof change !== 'number' || isNaN(change)) {
    return '<span class="idx-card-chg neu">—</span>';
  }
  /* VIX: no up/dn colour, show volatility label instead */
  if (sym === '^VIX') {
    const hi = price > 20;
    return `<span class="idx-card-chg ${hi ? 'vix-hi' : 'vix-lo'}">${tr(hi ? 'vix_hi' : 'vix_lo')}</span>`;
  }
  const up  = change >= 0;
  const cls = up ? 'up' : 'dn';
  const pct = (up ? '+' : '') + changePct.toFixed(2) + '%';
  const chg = fmtChange(change, sym);
  return `<span class="idx-card-chg ${cls}">${pct} (${chg})</span>`;
}

function buildMktBadge(state) {
  if (!state) return '';
  const map = {
    REGULAR:  { zh: '開市',   en: 'Open',   cls: 'open' },
    PRE:      { zh: '盤前',   en: 'Pre',    cls: 'pre' },
    POST:     { zh: '盤後',   en: 'After',  cls: 'post' },
    POSTPOST: { zh: '盤後',   en: 'After',  cls: 'post' },
  };
  const e = map[state] || { zh: '收市', en: 'Closed', cls: 'closed' };
  return `<span class="idx-mkt-badge ${e.cls}">${e[currentLang] || e.zh}</span>`;
}

/* ── Card HTML ───────────────────────────────────────── */
function buildIdxExtra(idx, data) {
  const sym = idx.symbol;
  const { price, fiftyTwoWeekLow: lo, fiftyTwoWeekHigh: hi, open, ytdReturn } = data;
  const hasRange  = lo != null && hi != null;
  const rangeText = hasRange ? `${tr('card_52w_label')}: ${fmtIdxPrice(lo, sym)} — ${fmtIdxPrice(hi, sym)}` : null;
  const pct       = hasRange ? calcWeekPosition(price, lo, hi) : null;

  let ytdHtml = '';
  if (ytdReturn != null) {
    const pctVal = ytdReturn * 100;
    const sign   = pctVal >= 0 ? '+' : '';
    const cls    = pctVal >= 0 ? 'extra-up' : 'extra-dn';
    ytdHtml = `<span class="${cls}">${tr('card_ytd')}: ${sign}${pctVal.toFixed(2)}%</span>`;
  }
  const openHtml = open != null
    ? `<span>${tr('k_open')}: ${fmtIdxPrice(open, sym)}</span>`
    : '';

  const metaParts = [ytdHtml, openHtml].filter(Boolean);
  if (!rangeText && !metaParts.length) return '';

  return [
    rangeText    ? `<div class="card-extra-range">${rangeText}</div>` : '',
    hasRange     ? renderPositionBar(pct) : '',
    metaParts.length ? `<div class="card-extra-meta">${metaParts.join('<span style="color:var(--muted-2)"> | </span>')}</div>` : '',
  ].filter(Boolean).join('');
}

function cardHTML(idx, data) {
  const en   = IDX_EN[idx.symbol];
  const name = currentLang === 'en' ? (en?.name || idx.name) : idx.name;
  const desc = currentLang === 'en' ? (en?.desc || idx.desc) : idx.desc;
  const id         = symId(idx.symbol);
  const badge      = data ? buildMktBadge(data.marketState) : '';
  const priceInner = data
    ? fmtIdxPrice(data.price, idx.symbol)
    : `<span class="sk" style="width:80px;height:13px;border-radius:3px"></span>`;
  const chgInner   = data
    ? buildChgHtml(data.price, data.change, data.changePercent, idx.symbol)
    : `<span class="sk" style="width:80px;height:20px;border-radius:5px"></span>`;

  return `
<a href="detail.html?symbol=${encodeURIComponent(idx.symbol)}&type=${symType(idx.symbol)}&name=${encodeURIComponent(name)}" class="idx-card">
  <div class="idx-card-head" id="ih-${id}">
    <div class="idx-card-name">${name}</div>
    ${badge}
  </div>
  <div class="idx-card-sym">${idx.symbol}</div>
  <div class="idx-card-desc">${desc}</div>
  <div class="idx-card-bottom">
    <div class="idx-card-price" id="ip-${id}">${priceInner}</div>
    <div id="ic-${id}">${chgInner}</div>
  </div>
  <div class="idx-card-extra" id="ie-${id}">${data ? buildIdxExtra(idx, data) : ''}</div>
</a>`;
}

/* ── Render ──────────────────────────────────────────── */
function renderAll() {
  renderTabs();
  renderGrid();
  updatePageSub();
}

function updatePageSub() {
  $('idxPageSub').textContent = currentLang === 'zh'
    ? '環球主要股票指數、商品及匯率即時行情。'
    : 'Live global indices, commodities and FX rates.';
}

function renderTabs() {
  $('idxTabBar').innerHTML = CATS.map(c =>
    `<button class="idx-tab-btn${c.id === activeTab ? ' active' : ''}" data-id="${c.id}">${c.label[currentLang] || c.label.zh}</button>`
  ).join('');
  $('idxTabBar').querySelectorAll('.idx-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.id === activeTab) return;
      activeTab = btn.dataset.id;
      renderTabs();
      renderGrid();
    });
  });
}

function renderGrid() {
  const cat  = activeCat();
  const list = cat.indices;
  const gen  = ++loadGen;

  $('idxCount').textContent = `${list.length} ${currentLang === 'zh' ? '項' : 'items'}`;
  setStatus('');

  $('idxGrid').innerHTML = list.map(idx => cardHTML(idx, priceCache[idx.symbol])).join('');

  const uncached = list.filter(i => !priceCache[i.symbol]);
  if (uncached.length) loadPrices(uncached, gen);
}

/* ── Batched price loading ───────────────────────────── */
async function loadPrices(list, gen) {
  const total = list.length;
  let done = 0, errors = 0;
  setStatus(`${currentLang === 'zh' ? '載入中' : 'Loading'} ${done}/${total}`);

  for (const idx of list) {
    if (gen !== loadGen) return;
    try {
      const data = await API.getIndexQuote(idx.symbol);
      if (gen !== loadGen) return;
      priceCache[idx.symbol] = data;
      updateCard(idx, data);
    } catch (err) {
      errors++;
      markCardError(idx);
      if (errors === 1) console.warn('[StockLens/indices]', err.message);
    }
    done++;
    if (done < total) {
      setStatus(`${currentLang === 'zh' ? '載入中' : 'Loading'} ${done}/${total}`);
      await new Promise(r => setTimeout(r, 300));
    }
  }
  if (gen !== loadGen) return;
  if (errors === total) {
    setStatus(currentLang === 'zh'
      ? '⚠ 數據載入失敗，請確認 Netlify function 已部署'
      : '⚠ Failed to load — check Netlify functions');
  } else {
    setStatus('');
  }
}

function markCardError(idx) {
  const id = symId(idx.symbol);
  const priceEl = $(`ip-${id}`);
  const chgEl   = $(`ic-${id}`);
  if (priceEl) priceEl.textContent = '—';
  if (chgEl)   chgEl.innerHTML = `<span class="idx-card-chg neu">${currentLang === 'zh' ? '暫無數據' : 'N/A'}</span>`;
}

function updateCard(idx, data) {
  const id      = symId(idx.symbol);
  const priceEl = $(`ip-${id}`);
  const chgEl   = $(`ic-${id}`);
  const headEl  = $(`ih-${id}`);
  const extraEl = $(`ie-${id}`);
  if (!priceEl || !chgEl) return;

  priceEl.textContent = fmtIdxPrice(data.price, idx.symbol);
  chgEl.innerHTML     = buildChgHtml(data.price, data.change, data.changePercent, idx.symbol);

  if (headEl) {
    headEl.querySelector('.idx-mkt-badge')?.remove();
    headEl.insertAdjacentHTML('beforeend', buildMktBadge(data.marketState));
  }
  if (extraEl) extraEl.innerHTML = buildIdxExtra(idx, data);
}

function setStatus(text) { $('idxLoadStatus').textContent = text; }

/* ── Boot ────────────────────────────────────────────── */
applyLang(); applyTheme();
(async () => {
  await initAuth();
  await wlInit();
  renderAll();
})();

document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => {
    setLang(b.dataset.lang);
    applyTheme();
    renderAll();
  });
});
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
</script>
</body>
