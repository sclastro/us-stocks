/* ── State ───────────────────────────────────────── */
let activeGroupId = 'asset';
let activeCatId   = 'us_index';
let loadGen       = 0;
const priceCache  = {};

/* ── Helpers ─────────────────────────────────────── */
const $ = id => document.getElementById(id);
const activeGroup = () => GROUPS.find(g => g.id === activeGroupId);
const activeCat   = () => activeGroup().cats.find(c => c.id === activeCatId);
const lbl = obj => obj.label[currentLang] || obj.label.zh;

/* ── Render ──────────────────────────────────────── */
function renderAll() {
  renderGroupTabs();
  renderCatTabs();
  renderGrid();
  updatePageSub();
}

function updatePageSub() {
  $('etfPageSub').textContent = currentLang === 'zh'
    ? 'ETF 分類行情，點擊任何 ETF 查看完整詳情。'
    : 'ETF market overview. Click any card for full details.';
}

function renderGroupTabs() {
  $('groupBar').innerHTML = GROUPS.map(g =>
    `<button class="etf-group-btn${g.id === activeGroupId ? ' active' : ''}" data-gid="${g.id}">${lbl(g)}</button>`
  ).join('');
  $('groupBar').querySelectorAll('.etf-group-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeGroupId = btn.dataset.gid;
      activeCatId   = activeGroup().cats[0].id;
      renderAll();
    });
  });
}

function renderCatTabs() {
  $('catBar').innerHTML = activeGroup().cats.map(c =>
    `<button class="etf-cat-btn${c.id === activeCatId ? ' active' : ''}" data-cid="${c.id}">${lbl(c)}</button>`
  ).join('');
  $('catBar').querySelectorAll('.etf-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.cid === activeCatId) return;
      activeCatId = btn.dataset.cid;
      renderCatTabs();
      renderGrid();
    });
  });
}

function renderGrid() {
  const etfs = activeCat().etfs;
  const gen  = ++loadGen;

  $('etfCount').textContent = `${etfs.length} ETFs`;
  setStatus('');

  $('etfGrid').innerHTML = etfs.map(etf => cardHTML(etf, priceCache[etf.sym])).join('');

  const uncached = etfs.filter(e => !priceCache[e.sym]);
  if (uncached.length) loadPrices(uncached, gen);
}

function cardHTML(etf, data) {
  const en    = ETF_EN[etf.sym];
  const name  = currentLang === 'en' ? (en?.name || etf.name) : etf.name;
  const desc  = currentLang === 'en' ? (en?.desc || etf.desc) : etf.desc;
  const priceInner = data
    ? fmt$(data.price)
    : `<span class="sk" style="width:66px;height:13px;border-radius:3px"></span>`;
  const chgInner = data
    ? buildChgSpan(data.changePercent, data.change)
    : `<span class="sk" style="width:50px;height:20px;border-radius:5px"></span>`;

  return `
<a href="detail.html?symbol=${encodeURIComponent(etf.sym)}&type=etf&name=${encodeURIComponent(name)}" class="etf-card">
  <div class="etf-card-sym">${etf.sym}</div>
  <div class="etf-card-name">${name}</div>
  <div class="etf-card-desc">${desc}</div>
  <div class="etf-card-bottom">
    <div class="etf-card-price" id="ep-${etf.sym}">${priceInner}</div>
    <div id="ec-${etf.sym}">${chgInner}</div>
  </div>
  <div class="etf-card-extra" id="ee-${etf.sym}">${data ? buildEtfExtra(data) : ''}</div>
</a>`;
}

function buildEtfExtra(data) {
  const { price, fiftyTwoWeekLow: lo, fiftyTwoWeekHigh: hi, volume, totalAssets } = data;
  const hasRange  = lo != null && hi != null;
  const rangeText = hasRange ? `${tr('card_52w_label')}: ${fmt$(lo)} — ${fmt$(hi)}` : null;
  const pct       = hasRange ? calcWeekPosition(price, lo, hi) : null;
  const volText   = volume ? `${tr('card_vol')}: ${formatVolume(volume)}` : null;
  const aumVal    = fmtAssets(totalAssets);
  const aumText   = aumVal ? `${tr('card_aum')}: ${aumVal}` : null;
  const metaParts = [volText, aumText].filter(Boolean);
  if (!rangeText && !metaParts.length) return '';
  return [
    rangeText    ? `<div class="card-extra-range">${rangeText}</div>` : '',
    hasRange     ? renderPositionBar(pct) : '',
    metaParts.length ? `<div class="card-extra-meta">${metaParts.join('<span style="color:var(--muted-2)"> | </span>')}</div>` : '',
  ].filter(Boolean).join('');
}

function buildChgSpan(dp, d) {
  const up  = dp >= 0;
  const cls = up ? 'up' : dp < 0 ? 'dn' : 'neu';
  return `<span class="etf-card-chg ${cls}">${up ? '+' : ''}${dp.toFixed(2)}%</span>`;
}

/* ── Batched price loading ───────────────────────── */
async function loadPrices(etfs, gen) {
  const total = etfs.length;
  let done = 0;
  setStatus(`${currentLang === 'zh' ? '載入中' : 'Loading'} ${done}/${total}`);

  for (const etf of etfs) {
    if (gen !== loadGen) return;
    try {
      const data = await API.getIndexQuote(etf.sym);
      if (gen !== loadGen) return;
      priceCache[etf.sym] = data;
      updateCard(etf.sym, data);
    } catch { /* skip on error, card stays as skeleton */ }
    done++;
    if (done < total) {
      setStatus(`${currentLang === 'zh' ? '載入中' : 'Loading'} ${done}/${total}`);
      await new Promise(r => setTimeout(r, 300));
    }
  }
  if (gen === loadGen) setStatus('');
}

function updateCard(sym, data) {
  const priceEl = $(`ep-${sym}`);
  const chgEl   = $(`ec-${sym}`);
  const extraEl = $(`ee-${sym}`);
  if (!priceEl || !chgEl) return;
  priceEl.textContent = fmt$(data.price);
  chgEl.innerHTML     = buildChgSpan(data.changePercent, data.change);
  if (extraEl) extraEl.innerHTML = buildEtfExtra(data);
}

function setStatus(text) { $('loadStatus').textContent = text; }

/* ── Boot ────────────────────────────────────────── */
applyLang(); applyTheme();
(async () => {
  await initAuth();
  await wlInit();
  renderAll();
})();

document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => {
    setLang(b.dataset.lang);
    applyTheme();
    renderAll();
  });
});
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
</script>
