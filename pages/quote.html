<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLens — 股票查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="quote.html">
      <div class="logo-mark" aria-hidden="true"></div>
      <span data-i18n="logo_name"><b>Stock</b><span class="dim">Lens</span></span>
    </a>
    <div class="nav-tabs">
      <a href="quote.html"     class="nav-tab active" data-i18n="nav_quote">股票查詢</a>
      <a href="etf.html"       class="nav-tab"        data-i18n="nav_etf">ETF</a>
      <a href="indices.html"   class="nav-tab"        data-i18n="nav_indices">環球指數</a>
      <a href="watchlist.html" class="nav-tab">
        <span data-i18n="nav_watchlist">自選清單</span> <span class="wl-badge" id="wlBadge" hidden>0</span>
      </a>
      <a href="portfolio.html" class="nav-tab"        data-i18n="nav_portfolio">持倉</a>
    </div>
    <div class="nav-right">
      <span class="mkt-pill"><span class="dot"></span><span data-i18n="market_open">市場開市</span></span>
      <div class="lang-toggle" id="langToggle">
        <button type="button" data-lang="zh">繁中</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button">🌙</button>
      <span class="nav-powered"><span data-i18n="powered_by">技術提供</span> <b>Finnhub</b></span>
      <a href="login.html" class="nav-login-btn" id="navLoginBtn" data-i18n="nav_login">登入</a>
      <div class="nav-user-wrap" id="navUserWrap" hidden>
        <span class="nav-user-name" id="navUserName"></span>
        <button class="nav-logout-btn" id="navLogoutBtn" type="button" data-i18n="nav_logout">登出</button>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>

  <!-- Hero -->
  <section class="hero">
    <h1 data-i18n="hero_title">股票<em>即時</em>查詢</h1>
    <p data-i18n="hero_sub">輸入股票代碼，獲取即時行情、K 線圖及最新新聞</p>
    <div class="search-wrap">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="sym-input" data-i18n-ph="search_ph" placeholder="輸入代碼，例如 AAPL" autocomplete="off" spellcheck="false">
        <button id="srch-btn" class="srch-btn" data-i18n="search">查詢</button>
      </div>
    </div>
    <div class="hot-row">
      <span class="hlabel" data-i18n="trending">熱門</span>
      <span class="chip" data-sym="AAPL">AAPL</span>
      <span class="chip" data-sym="TSLA">TSLA</span>
      <span class="chip" data-sym="GOOGL">GOOGL</span>
      <span class="chip" data-sym="MSFT">MSFT</span>
      <span class="chip" data-sym="NVDA">NVDA</span>
      <span class="chip" data-sym="AMZN">AMZN</span>
      <span class="chip" data-sym="META">META</span>
    </div>
    <!-- Recent searches -->
    <div class="recent-row" id="recentRow" hidden></div>
  </section>

  <!-- Error -->
  <div id="st-err" hidden>
    <div class="state-card">
      <div class="state-ico">⚠️</div>
      <div class="state-ttl" data-i18n="err_title">查詢失敗</div>
      <div class="state-desc" id="err-msg"></div>
    </div>
  </div>

</main>

<footer>
  <div data-i18n="footer_left">StockLens · 僅供研究及教育用途，不構成投資建議。</div>
  <div><span data-i18n="footer_delay">報價延遲約 15 分鐘</span> · <a href="#" data-i18n="footer_terms">服務條款</a></div>
</footer>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <a href="quote.html"     class="bn-item active">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <span data-i18n="bn_quote">查詢</span>
  </a>
  <a href="etf.html"       class="bn-item">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>ETF</span>
  </a>
  <a href="indices.html"   class="bn-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 0 1 0 18M3 12h18"/></svg>
    <span data-i18n="bn_indices">指數</span>
  </a>
  <a href="watchlist.html" class="bn-item">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span data-i18n="bn_watchlist">自選</span>
  </a>
  <a href="portfolio.html" class="bn-item">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    <span data-i18n="bn_portfolio">持倉</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script>
'use strict';

const $ = id => document.getElementById(id);

/* ── Boot ────────────────────────────────────────── */
applyLang(); applyTheme();
renderRecent();
(async () => {
  await initAuth();
  await wlInit();
  fetchChipQuotes();
})();

$('sym-input').addEventListener('input',   e => { e.target.value = e.target.value.toUpperCase(); });
$('sym-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
$('srch-btn').addEventListener('click', doSearch);

document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => { setLang(b.dataset.lang); applyTheme(); renderRecent(); });
});
document.getElementById('themeToggle').addEventListener('click', toggleTheme);

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => qs(c.dataset.sym));
});

/* ── Auto-load from URL param → redirect to detail ── */
const _urlSym = new URLSearchParams(window.location.search).get('symbol');
if (_urlSym) {
  const _s = _urlSym.toUpperCase();
  window.location.replace(`detail.html?symbol=${encodeURIComponent(_s)}&type=stock&name=${encodeURIComponent(_s)}`);
}

/* ── Chip quote badges ───────────────────────────── */
async function fetchChipQuotes() {
  for (const sym of CONFIG.HOT_STOCKS) {
    try {
      const q    = await API.getQuote(sym);
      const chip = document.querySelector(`.chip[data-sym="${sym}"]`);
      if (chip && q.dp !== undefined) {
        const up = q.dp >= 0;
        chip.innerHTML = `${sym} <span class="dlt ${up?'':'dn'}">${up?'+':''}${q.dp.toFixed(2)}%</span>`;
        if (watchlist.has(sym)) chip.classList.add('is-watched');
      }
    } catch { /* ignore */ }
    await new Promise(r => setTimeout(r, 400));
  }
}

/* ── Recent searches ─────────────────────────────── */
function renderRecent() {
  const row = $('recentRow');
  const items = loadRecent();
  if (items.length === 0) { row.hidden = true; return; }
  row.hidden = false;
  row.innerHTML =
    `<span class="hlabel" data-i18n="recent">${tr('recent')}</span>` +
    items.map(sym =>
      `<span class="recent-chip" data-sym="${sym}">
        <span class="rc-sym">${sym}</span>
        <span class="rc-x" data-del="${sym}" title="${tr('recent_clear')}">✕</span>
      </span>`
    ).join('') +
    `<button class="recent-clear" id="recentClearBtn">${tr('recent_clear')}</button>`;

  row.querySelectorAll('.recent-chip').forEach(chip => {
    chip.addEventListener('click', e => {
      if (e.target.classList.contains('rc-x')) {
        removeRecent(e.target.dataset.del);
        renderRecent();
      } else {
        qs(chip.dataset.sym);
      }
    });
  });
  $('recentClearBtn').addEventListener('click', () => { clearRecent(); renderRecent(); });
}

/* ── Search ──────────────────────────────────────── */
function qs(sym) { $('sym-input').value = sym; doSearch(); }

function doSearch() {
  const sym = $('sym-input').value.trim().toUpperCase();
  if (!sym) return;

  if (sym.startsWith('^') || sym.includes('=F') || sym.includes('=X')) {
    $('st-err').hidden = false;
    $('err-msg').textContent = currentLang === 'zh'
      ? '指數、商品及匯率，請前往「環球指數」頁面查看。'
      : 'For indices, commodities and FX, please visit the Global Indices page.';
    return;
  }

  $('st-err').hidden = true;
  saveRecent(sym);   // ← 儲存搜尋記錄
  window.location.href = `detail.html?symbol=${encodeURIComponent(sym)}&type=stock&name=${encodeURIComponent(sym)}`;
}
</script>
</body>
</html>
