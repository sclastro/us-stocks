<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLens — 股票查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="quote.html">
      <div class="logo-mark" aria-hidden="true"></div>
      <span><b>Stock</b><span class="dim">Lens</span></span>
    </a>
    <div class="nav-tabs">
      <a href="quote.html"     class="nav-tab active" data-i18n="nav_quote">股票查詢</a>
      <a href="etf.html"       class="nav-tab"        data-i18n="nav_etf">ETF</a>
      <a href="indices.html"   class="nav-tab"        data-i18n="nav_indices">環球指數</a>
      <a href="watchlist.html" class="nav-tab"        data-i18n="nav_watchlist">
        自選清單 <span class="wl-badge" id="wlBadge" hidden>0</span>
      </a>
      <a href="portfolio.html" class="nav-tab"        data-i18n="nav_portfolio">持倉</a>
    </div>
    <div class="nav-right">
      <span class="mkt-pill"><span class="dot"></span><span data-i18n="market_open">市場開市</span></span>
      <div class="lang-toggle" id="langToggle">
        <button type="button" data-lang="zh">繁中</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <span class="nav-powered"><span data-i18n="powered_by">技術提供</span> <b>Finnhub</b></span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>

  <!-- Hero -->
  <section class="hero">
    <h1 data-i18n="hero_title">股票<em>即時</em>查詢</h1>
    <p data-i18n="hero_sub">輸入股票代碼，獲取即時行情、K 線圖及最新新聞</p>
    <div class="search-wrap">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="sym-input" data-i18n-ph="search_ph" placeholder="輸入代碼，例如 AAPL" autocomplete="off" spellcheck="false">
        <button id="srch-btn" class="srch-btn" data-i18n="search">查詢</button>
      </div>
    </div>
    <div class="hot-row">
      <span class="hlabel" data-i18n="trending">熱門</span>
      <span class="chip" data-sym="AAPL">AAPL</span>
      <span class="chip" data-sym="TSLA">TSLA</span>
      <span class="chip" data-sym="GOOGL">GOOGL</span>
      <span class="chip" data-sym="MSFT">MSFT</span>
      <span class="chip" data-sym="NVDA">NVDA</span>
      <span class="chip" data-sym="AMZN">AMZN</span>
      <span class="chip" data-sym="META">META</span>
    </div>
  </section>

  <!-- Error -->
  <div id="st-err" hidden>
    <div class="state-card">
      <div class="state-ico">⚠️</div>
      <div class="state-ttl" data-i18n="err_title">查詢失敗</div>
      <div class="state-desc" id="err-msg"></div>
    </div>
  </div>

  <!-- Results grid -->
  <div id="results" class="grid" hidden>

    <!-- LEFT: quote + chart -->
    <div class="left-col">

      <!-- Stock card -->
      <div class="card">
        <div class="stock-head" id="stock-head">
          <div class="stock-head-top">
            <div class="stock-id">
              <div class="stock-logo" id="stock-logo">AA</div>
              <div class="stock-meta">
                <h2>
                  <span class="sym" id="r-sym"></span>
                  <span class="nm"  id="r-name"></span>
                </h2>
                <div class="stock-tags">
                  <span id="r-exchange"></span>
                  <span id="r-sec"></span>
                  <span id="r-currency">USD</span>
                </div>
              </div>
            </div>
            <div class="mkt-state">
              <div class="live-ind" data-i18n="live">即時</div>
              <div class="live-time" id="live-time"></div>
            </div>
          </div>
          <div class="price-line">
            <span class="price-main" id="r-price"></span>
            <span class="price-delta" id="r-delta"></span>
            <button class="watch-btn" id="watchBtn" type="button" aria-pressed="false">
              <svg class="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <span class="watch-label" data-i18n="add_watch">加入自選</span>
            </button>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="k" data-i18n="k_open">開盤</div><div class="v" id="r-open">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_hl">最高 · 最低</div><div class="v" id="r-hl">—</div><div class="sub" id="r-hl-sub"></div></div>
          <div class="stat"><div class="k" data-i18n="k_vol">成交量</div><div class="v" id="r-vol">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_cap">市值</div><div class="v" id="r-cap">—</div></div>
          <div class="stat"><div class="k" data-i18n="k_52w">52 週區間</div><div class="v" id="r-52">—</div><div class="sub" id="r-52pos"></div></div>
        </div>
      </div>

      <!-- Chart card -->
      <div class="card">
        <div class="chart-head">
          <h3>
            <span data-i18n="chart_title">價格走勢</span>
            <span class="chart-badge" id="chart-badge">1M · 日線</span>
          </h3>
          <div class="timeframes">
            <button class="tf-btn active" data-period="1M">1M</button>
            <button class="tf-btn"        data-period="3M">3M</button>
            <button class="tf-btn"        data-period="6M">6M</button>
            <button class="tf-btn"        data-period="1Y">1Y</button>
            <button class="tf-btn"        data-period="3Y">3Y</button>
            <button class="tf-btn"        data-period="5Y">5Y</button>
          </div>
        </div>
        <div class="chart-wrap">
          <div id="tv-loader" class="chart-loader">
            <div class="chart-spin"></div>
            <span data-i18n="chart_loading">圖表載入中…</span>
          </div>
          <iframe id="tv-chart" class="tv-chart tv-loading" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
        </div>
      </div>
    </div>

    <!-- RIGHT: news -->
    <aside class="card news-card">
      <div class="news-head">
        <h3>
          <span data-i18n="latest_news">最新新聞</span>
          <span class="n-count" id="newsCount">0</span>
        </h3>
      </div>
      <div class="news-list" id="news-list"></div>
    </aside>

  </div><!-- /#results -->
</main>

<footer>
  <div data-i18n="footer_left">StockLens · 僅供研究及教育用途，不構成投資建議。</div>
  <div><span data-i18n="footer_delay">報價延遲約 15 分鐘</span> · <a href="#" data-i18n="footer_terms">服務條款</a></div>
</footer>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <a href="quote.html"     class="bn-item active">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <span>查詢</span>
  </a>
  <a href="etf.html"       class="bn-item">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>ETF</span>
  </a>
  <a href="indices.html"   class="bn-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 0 1 0 18M3 12h18"/></svg>
    <span>指數</span>
  </a>
  <a href="watchlist.html" class="bn-item">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>自選</span>
  </a>
  <a href="portfolio.html" class="bn-item">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    <span>持倉</span>
  </a>
</nav>

<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script>
'use strict';

/* ── State ───────────────────────────────────────── */
const $ = id => document.getElementById(id);
let newsData     = [];
let activePeriod = '1M';
let currentSym   = '';

/* ── Boot ────────────────────────────────────────── */
applyLang();
updateWlBadge();
fetchChipQuotes();
tick(); setInterval(tick, 1000);

$('sym-input').addEventListener('input',   e => { e.target.value = e.target.value.toUpperCase(); });
$('sym-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
$('srch-btn').addEventListener('click', doSearch);

document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => {
    setLang(b.dataset.lang);
    if (currentSym) syncWatchBtn();
    renderNews();
    updateChartBadge();
  });
});

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => qs(c.dataset.sym));
});

document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => switchPeriod(btn.dataset.period, btn));
});

$('watchBtn').addEventListener('click', () => {
  if (!currentSym) return;
  const btn = $('watchBtn');
  if (watchlist.has(currentSym)) {
    watchlist.delete(currentSym);
  } else {
    watchlist.add(currentSym);
    btn.classList.remove('pop');
    void btn.offsetWidth;
    btn.classList.add('pop');
  }
  saveWatchlist();
  syncWatchBtn();
  updateWlBadge();
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('is-watched', watchlist.has(c.dataset.sym));
  });
});

/* ── Auto-load from URL param ────────────────────── */
const urlSym = new URLSearchParams(window.location.search).get('symbol');
if (urlSym) qs(urlSym.toUpperCase());

/* ── Clock ───────────────────────────────────────── */
function tick(){
  const d  = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  const el = $('live-time');
  if (el) el.textContent = `${hh}:${mm}:${ss}`;
}

/* ── Chip quote badges ───────────────────────────── */
async function fetchChipQuotes(){
  for (const sym of CONFIG.HOT_STOCKS) {
    try {
      const q    = await API.getQuote(sym);
      const chip = document.querySelector(`.chip[data-sym="${sym}"]`);
      if (chip && q.dp !== undefined) {
        const up = q.dp >= 0;
        chip.innerHTML = `${sym} <span class="dlt ${up?'':'dn'}">${up?'+':''}${q.dp.toFixed(2)}%</span>`;
        if (watchlist.has(sym)) chip.classList.add('is-watched');
        if (sym === currentSym)  chip.classList.add('active');
      }
    } catch { /* ignore */ }
    await new Promise(r => setTimeout(r, 400));
  }
}

/* ── Search ──────────────────────────────────────── */
function qs(sym){ $('sym-input').value = sym; doSearch(); }

async function doSearch(){
  const sym = $('sym-input').value.trim().toUpperCase();
  if (!sym) return;

  currentSym   = sym;
  newsData     = [];
  activePeriod = '1M';

  const btn = $('srch-btn');
  btn.disabled    = true;
  btn.textContent = tr('searching');

  $('st-err').hidden  = true;
  $('results').hidden = false;
  showQuoteSkeleton();
  showNewsSkeleton();

  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tf-btn').classList.add('active');
  $('tv-loader').hidden = false;
  $('tv-chart').classList.add('tv-loading');
  $('tv-chart').onload  = null;
  $('tv-chart').src     = '';

  const quoteP   = API.getQuote(sym);
  const profileP = API.getCompanyProfile(sym).catch(() => ({}));
  const metricP  = API.getMetrics(sym).catch(() => ({}));
  const newsP    = API.getNews(sym);

  let quote, profile, metric;
  try {
    [quote, profile, metric] = await Promise.all([quoteP, profileP, metricP]);
    if (!quote.pc || quote.pc === 0)
      throw new Error(`找不到股票代碼「${sym}」。\n請確認代碼是否正確（例如 AAPL、TSLA、GOOGL）`);
  } catch(err){
    $('results').hidden = true;
    $('st-err').hidden  = false;
    $('err-msg').textContent = err.message || '查詢失敗，請稍後再試';
    btn.disabled    = false;
    btn.textContent = tr('search');
    return;
  }

  renderQuote(quote, profile, metric, sym);
  syncWatchBtn();
  updateTVChart();
  btn.disabled    = false;
  btn.textContent = tr('search');

  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.sym === sym));

  try {
    const news = await newsP;
    if (currentSym === sym){ newsData = news; renderNews(); }
  } catch {
    if (currentSym === sym) renderNews();
  }
}

/* ── Render: Quote ───────────────────────────────── */
function renderQuote(q, p, m, sym){
  const isUp = (q.d || 0) >= 0;
  const tint = TINTS[sym] || DEFAULT_TINT;

  $('stock-logo').textContent = sym.slice(0,2);
  const sh = $('stock-head');
  sh.style.setProperty('--stock-fg', tint.fg);
  sh.style.setProperty('--stock-bg', tint.bg);
  sh.style.setProperty('--stock-bd', tint.bd);

  $('r-sym').textContent      = sym;
  $('r-name').textContent     = p.name  || sym;
  $('r-exchange').textContent = p.exchange        || '—';
  $('r-sec').textContent      = p.finnhubIndustry || '—';
  $('r-currency').textContent = p.currency        || 'USD';

  $('r-price').textContent = fmt$(q.c);

  const d = $('r-delta');
  d.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="${isUp?'m5 15 7-7 7 7':'m5 9 7 7 7-7'}"/></svg>${isUp?'+':''}${Math.abs(q.d||0).toFixed(2)} (${isUp?'+':''}${Math.abs(q.dp||0).toFixed(2)}%)`;
  d.className = 'price-delta ' + (isUp ? 'up' : 'down');

  $('r-open').textContent    = fmt$(q.o);
  $('r-hl').textContent      = `${fmt$(q.h)} / ${fmt$(q.l)}`;
  $('r-hl-sub').textContent  = `Range $${(q.h - q.l).toFixed(2)}`;
  $('r-vol').textContent     = '—';
  $('r-cap').textContent     = p.marketCapitalization ? fmtCap(p.marketCapitalization) : '—';

  const h52 = m?.metric?.['52WeekHigh'];
  const l52 = m?.metric?.['52WeekLow'];
  if (h52 && l52){
    $('r-52').textContent    = `${h52.toFixed(2)} — ${l52.toFixed(2)}`;
    const pos = Math.round(100 * (q.c - l52) / (h52 - l52));
    $('r-52pos').textContent = `${Math.max(0,Math.min(100,pos))}${tr('of_range')}`;
  } else {
    $('r-52').textContent    = '—';
    $('r-52pos').textContent = '';
  }
}

/* ── Skeletons ───────────────────────────────────── */
function showQuoteSkeleton(){
  $('r-sym').innerHTML   = sk('46px','11px','3px');
  $('r-name').innerHTML  = sk('160px','14px');
  $('r-price').innerHTML = sk('155px','38px');
  const d = $('r-delta'); d.className='price-delta'; d.innerHTML=sk('105px','22px','6px');
  ['r-open','r-hl','r-vol','r-cap','r-52'].forEach(id => { if ($(id)) $(id).innerHTML=sk('68px','14px'); });
  $('r-exchange').textContent=''; $('r-sec').textContent=''; $('r-currency').textContent='';
  $('r-hl-sub').textContent=''; $('r-52pos').textContent='';
  $('stock-logo').textContent='';
}
function showNewsSkeleton(){
  $('news-list').innerHTML = Array(5).fill(0).map(() => `
    <div class="news-item" style="pointer-events:none;user-select:none">
      <div class="news-meta" style="margin-bottom:8px">${sk('48px','9px','3px')} ${sk('60px','9px','3px')}</div>
      ${skb('90%','13px','4px')}${skb('72%','13px','4px')}${skb('50%','11px','0')}
    </div>`).join('');
}

/* ── Watchlist sync ──────────────────────────────── */
function syncWatchBtn(){
  const btn = $('watchBtn');
  if (!btn || !currentSym) return;
  const on = watchlist.has(currentSym);
  btn.classList.toggle('is-on', on);
  btn.setAttribute('aria-pressed', String(on));
  btn.querySelector('.watch-label').textContent = on ? tr('on_watch') : tr('add_watch');
}

/* ── Chart (TradingView) ─────────────────────────── */
const TV_RANGE    = {'1M':'1M','3M':'3M','6M':'6M','1Y':'12M','3Y':'36M','5Y':'60M'};
const TV_INTERVAL = {'1M':'D', '3M':'D', '6M':'D', '1Y':'W',  '3Y':'W',  '5Y':'M' };

function buildTVUrl(sym, period){
  const p = new URLSearchParams({
    symbol: sym, interval: TV_INTERVAL[period]||'D', range: TV_RANGE[period]||'1M',
    theme: 'light', style: '1', locale: 'zh_TW', timezone: 'Asia/Hong_Kong',
    toolbar_bg: 'ffffff', hide_side_toolbar: '0', allow_symbol_change: '1',
    save_image: '0', hideideas: '1', hide_top_toolbar: '0',
  });
  return 'https://www.tradingview.com/widgetembed/?' + p.toString();
}
function updateChartBadge(){
  const el = $('chart-badge');
  if (!el) return;
  const lbl = (activePeriod==='3Y'||activePeriod==='5Y') ? tr('weekly') : tr('daily');
  el.textContent = `${activePeriod} · ${lbl}`;
}
function updateTVChart(){
  if (!currentSym) return;
  const sym = currentSym, frame = $('tv-chart'), loader = $('tv-loader');
  loader.hidden = false;
  frame.classList.add('tv-loading');
  frame.onload = () => {
    if (currentSym !== sym) return;
    frame.classList.remove('tv-loading');
    loader.hidden = true;
  };
  frame.src = buildTVUrl(sym, activePeriod);
  updateChartBadge();
}
function switchPeriod(period, btn){
  activePeriod = period;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateTVChart();
}

/* ── Render: News ────────────────────────────────── */
function renderNews(){
  const el = $('news-list');
  $('newsCount').textContent = newsData.length;
  if (!newsData.length){
    el.innerHTML = `<div style="padding:28px 22px;text-align:center;color:var(--muted-2);font-size:13px;line-height:1.7">暫無最新新聞，請稍後再試</div>`;
    return;
  }
  const sl = {pos:tr('sent_pos'), neg:tr('sent_neg'), neu:tr('sent_neu')};
  el.innerHTML = newsData.slice(0,12).map((item,i) => {
    const date       = tsToDate(item.datetime);
    const hasSummary = !!(item.summary?.trim() && item.summary !== item.headline);
    const sent       = detectSentiment(item.headline, item.summary);
    return `
<div class="news-item">
  <div class="news-meta">
    <span class="n-src">${esc(item.source||'')}</span>
    <span class="n-dot"></span>
    <span>${date}</span>
    <span class="n-sent ${sent}">${sl[sent]}</span>
  </div>
  <div class="news-title">
    <a href="${esc(item.url||'#')}" target="_blank" rel="noopener noreferrer">${esc(item.headline||'')}</a>
  </div>
  ${hasSummary ? `<p class="news-summary" id="ns-${i}">${esc(item.summary)}</p>` : ''}
  <div class="news-actions">
    ${hasSummary ? `<button class="btn-ghost" id="ntr-${i}" onclick="doTranslate(${i})"><span class="tr-lbl">${tr('tr_btn')}</span></button>` : ''}
  </div>
</div>`;
  }).join('');
}

/* ── Translate ───────────────────────────────────── */
async function doTranslate(i){
  const item = newsData[i];
  const btn  = $(`ntr-${i}`);
  const pEl  = $(`ns-${i}`);
  if (!btn || !pEl) return;

  if (btn.classList.contains('is-on')){
    pEl.textContent = item.summary; pEl.className='news-summary';
    btn.classList.remove('is-on'); btn.querySelector('.tr-lbl').textContent = tr('tr_btn');
    return;
  }

  btn.disabled = true;
  btn.querySelector('.tr-lbl').innerHTML = `<span class="mini-spin"></span> ${tr('tr_ing')}`;

  try {
    const text = `${item.headline||''}. ${item.summary||''}`.trim().substring(0,1000);
    const url  = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error('http');
    const data = await res.json();
    const out  = data[0].map(s => s[0]).join('');
    if (!out) throw new Error('empty');
    pEl.textContent = out; pEl.classList.add('translated');
    btn.classList.add('is-on'); btn.disabled = false;
    btn.querySelector('.tr-lbl').textContent = tr('tr_orig');
  } catch {
    btn.disabled = false;
    btn.querySelector('.tr-lbl').textContent = '↺ 失敗，點擊重試';
  }
}
</script>
</body>
</html>
