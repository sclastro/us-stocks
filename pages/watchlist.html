<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLens — 自選清單</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="quote.html">
      <div class="logo-mark" aria-hidden="true"></div>
      <span data-i18n="logo_name"><b>Stock</b><span class="dim">Lens</span></span>
    </a>
    <div class="nav-tabs">
      <a href="quote.html"     class="nav-tab"        data-i18n="nav_quote">股票查詢</a>
      <a href="etf.html"       class="nav-tab"        data-i18n="nav_etf">ETF</a>
      <a href="indices.html"   class="nav-tab"        data-i18n="nav_indices">環球指數</a>
      <a href="watchlist.html" class="nav-tab active">
        <span data-i18n="nav_watchlist">自選清單</span> <span class="wl-badge" id="wlBadge" hidden>0</span>
      </a>
      <a href="portfolio.html" class="nav-tab"        data-i18n="nav_portfolio">持倉</a>
    </div>
    <div class="nav-right">
      <span class="mkt-pill"><span class="dot"></span><span data-i18n="market_open">市場開市</span></span>
      <div class="lang-toggle" id="langToggle">
        <button type="button" data-lang="zh">繁中</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button">🌙</button>
      <span class="nav-powered"><span data-i18n="powered_by">技術提供</span> <b>Finnhub</b></span>
      <a href="login.html" class="nav-login-btn" id="navLoginBtn" data-i18n="nav_login">登入</a>
      <div class="nav-user-wrap" id="navUserWrap" hidden>
        <span class="nav-user-name" id="navUserName"></span>
        <button class="nav-logout-btn" id="navLogoutBtn" type="button" data-i18n="nav_logout">登出</button>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="wl-page-head">
    <div>
      <h1 data-i18n="wl_page_title">自選清單</h1>
      <div class="wl-sub" data-i18n="wl_subtitle">點擊股票查看詳情</div>
    </div>
    <div class="wl-actions">
      <span class="wl-status" id="wlStatus"></span>
      <button class="wl-clear-all" id="clearAllBtn" data-i18n="wl_clear" hidden>清除全部</button>
      <div class="pf-confirm-wrap" id="clearAllConfirm" hidden>
        <button class="pf-c-yes" id="clearAllYes" type="button" title="確認清除全部">✓</button>
        <button class="pf-c-no" id="clearAllNo" type="button" title="取消">✗</button>
      </div>
    </div>
  </div>

  <!-- Sync note (guest / logged-in) -->
  <div class="pf-guest-note" id="wlSyncNote">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
    <span>Guest 模式 · 資料儲存於本機</span>
  </div>

  <!-- Empty state -->
  <div id="wlEmpty" hidden>
    <div class="state-card">
      <div class="state-ico">⭐</div>
      <div class="state-ttl" data-i18n="wl_empty">自選清單為空</div>
      <div class="state-desc" data-i18n="wl_empty_sub">在股票查詢頁搜尋，然後點擊「加入自選」</div>
      <a href="quote.html" class="state-link" data-i18n="nav_quote">股票查詢</a>
    </div>
  </div>

  <!-- Watchlist table -->
  <div id="wlTable" class="wl-table" hidden>
    <div class="wl-table-head">
      <span data-i18n="nav_quote">股票</span>
      <span class="col-r" data-i18n="wl_price">最新價</span>
      <span class="col-r col-chg" data-i18n="wl_change">升跌</span>
      <span class="col-r col-52range" data-i18n="wl_52w_range">52W 範圍</span>
      <span class="col-r col-52pos" data-i18n="wl_52w_pos">52W 位置</span>
      <span class="col-r col-vol" data-i18n="k_vol">成交量</span>
      <span class="col-r col-pe">P/E</span>
      <span class="col-r col-fwdpe" data-i18n="k_fwd_pe">預期市盈率</span>
      <span></span>
    </div>
    <div id="wlRows"></div>
  </div>
</main>

<footer>
  <div data-i18n="footer_left">StockLens · 僅供研究及教育用途，不構成投資建議。</div>
  <div><span data-i18n="footer_delay">報價延遲約 15 分鐘</span> · <a href="#" data-i18n="footer_terms">服務條款</a></div>
</footer>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <a href="quote.html"     class="bn-item">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <span data-i18n="bn_quote">查詢</span>
  </a>
  <a href="etf.html"       class="bn-item">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>ETF</span>
  </a>
  <a href="indices.html"   class="bn-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 0 1 0 18M3 12h18"/></svg>
    <span data-i18n="bn_indices">指數</span>
  </a>
  <a href="watchlist.html" class="bn-item active">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span data-i18n="bn_watchlist">自選</span>
  </a>
  <a href="portfolio.html" class="bn-item">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    <span data-i18n="bn_portfolio">持倉</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script>
'use strict';

const $ = id => document.getElementById(id);

/* ── Live price cache ────────────────────────────── */
const priceCache = {};

/* ── Boot ────────────────────────────────────────── */
applyLang(); applyTheme();
(async () => {
  await initAuth();
  await wlInit();
  _updateWlNote();
  renderPage();
})();

document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => { setLang(b.dataset.lang); applyTheme(); _updateWlNote(); renderPage(); });
});
document.getElementById('themeToggle').addEventListener('click', toggleTheme);

/* ── Auth state note ─────────────────────────────── */
function _updateWlNote() {
  const note = document.getElementById('wlSyncNote');
  if (!note) return;
  if (isLoggedIn()) {
    note.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>${currentLang === 'zh' ? '已登入 · 資料同步至雲端' : 'Signed in · Data synced to cloud'}</span>`;
  } else {
    note.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      <span>${currentLang === 'zh' ? 'Guest 模式 · 資料儲存於本機' : 'Guest mode · Data stored locally'}</span>`;
  }
}

$('clearAllBtn').addEventListener('click', () => {
  $('clearAllBtn').hidden = true;
  $('clearAllConfirm').hidden = false;
});
$('clearAllYes').addEventListener('click', async () => {
  await wlClear();
  $('clearAllConfirm').hidden = true;
  renderPage();
});
$('clearAllNo').addEventListener('click', () => {
  $('clearAllBtn').hidden = false;
  $('clearAllConfirm').hidden = true;
});

/* ── Render page ─────────────────────────────────── */
function renderPage(){
  const syms = [...watchlist];
  $('clearAllBtn').hidden = syms.length === 0;
  $('clearAllConfirm').hidden = true;

  if (syms.length === 0) {
    $('wlEmpty').hidden = false;
    $('wlTable').hidden = true;
    $('wlStatus').textContent = '';
    return;
  }
  $('wlEmpty').hidden = true;
  $('wlTable').hidden = false;
  renderRows(syms);
  fetchAllPrices(syms);
}

/* ── Render rows (skeleton first) ────────────────── */
function renderRows(syms){
  $('wlRows').innerHTML = syms.map(sym => {
    const cached = priceCache[sym];
    return rowHTML(sym, cached);
  }).join('');

  /* × → show inline confirm */
  $('wlRows').querySelectorAll('.wl-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const sym    = btn.dataset.sym;
      const remCol = document.getElementById(`wlrem-${sym}`);
      const row    = $('wlRows').querySelector(`.wl-row[data-sym="${sym}"]`);
      btn.hidden = true;
      remCol.querySelector('.pf-confirm-wrap').hidden = false;
      if (row) row.classList.add('wl-row--confirming');
    });
  });

  /* ✓ → confirm delete */
  $('wlRows').querySelectorAll('.wl-c-yes').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.preventDefault();
      e.stopPropagation();
      await wlRemove(btn.dataset.sym);
      renderPage();
    });
  });

  /* ✗ → cancel */
  $('wlRows').querySelectorAll('.wl-c-no').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const remCol = btn.closest('.wl-remove-col');
      const row    = btn.closest('.wl-row');
      remCol.querySelector('.wl-remove').hidden = false;
      remCol.querySelector('.pf-confirm-wrap').hidden = true;
      if (row) row.classList.remove('wl-row--confirming');
    });
  });
}

function rowHTML(sym, data){
  const priceStr  = data
    ? fmt$(data.price)
    : `<span class="sk" style="width:72px;height:14px;border-radius:3px"></span>`;
  const pct       = data?.changePercent || 0;
  const chgClass  = data ? (pct > 0 ? 'up' : pct < 0 ? 'dn' : 'neu') : 'loading';
  const chgStr    = data
    ? `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}% (${(data.change||0) >= 0 ? '+' : ''}${Math.abs(data.change||0).toFixed(2)})`
    : '—';
  const range52   = (data?.fiftyTwoWeekHigh && data?.fiftyTwoWeekLow)
    ? `${data.fiftyTwoWeekLow.toFixed(2)} — ${data.fiftyTwoWeekHigh.toFixed(2)}`
    : '—';
  const wkPct     = data ? calcWeekPosition(data.price, data.fiftyTwoWeekLow, data.fiftyTwoWeekHigh) : null;
  const posBar    = renderPositionBar(wkPct);
  const volStr    = data ? formatVolume(data.volume) : '—';
  const peStr     = data?.trailingPE ? data.trailingPE.toFixed(1) : '—';
  const fwdPEStr  = (data?.forwardPE && data.forwardPE > 0) ? data.forwardPE.toFixed(1) : '—';

  return `
<a href="detail.html?symbol=${encodeURIComponent(sym)}&type=stock&name=${encodeURIComponent(sym)}" class="wl-row" data-sym="${sym}">
  <div class="wl-sym-col">
    <div class="wl-sym-logo">${sym.slice(0,2)}</div>
    <div>
      <div class="wl-sym-name">${sym}</div>
      <div class="wl-sym-fullname" id="wlname-${sym}">${data?.shortName || '—'}</div>
    </div>
  </div>
  <div class="wl-price-col" id="wlprice-${sym}">${priceStr}</div>
  <div class="wl-chg-col">
    <span class="wl-chg ${chgClass}" id="wlchg-${sym}">${chgStr}</span>
  </div>
  <div class="wl-52range-col" id="wl52r-${sym}">${range52}</div>
  <div class="wl-52pos-col" id="wl52p-${sym}">${posBar}</div>
  <div class="wl-vol-col" id="wlvol-${sym}">${volStr}</div>
  <div class="wl-pe-col" id="wlpe-${sym}">${peStr}</div>
  <div class="wl-fwdpe-col" id="wlfwdpe-${sym}">${fwdPEStr}</div>
  <div class="wl-remove-col" id="wlrem-${sym}">
    <button class="wl-remove" data-sym="${sym}" title="移除" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="pf-confirm-wrap" hidden>
      <button class="pf-c-yes wl-c-yes" data-sym="${sym}" type="button" title="確認移除">✓</button>
      <button class="pf-c-no wl-c-no" type="button" title="取消">✗</button>
    </div>
  </div>
</a>`;
}

/* ── Fetch live prices via Yahoo Finance (batched 300ms) */
async function fetchAllPrices(syms){
  $('wlStatus').textContent = tr('wl_updating');
  let done = 0;

  for (const sym of syms) {
    try {
      const data = await API.getIndexQuote(sym);
      priceCache[sym] = data;
      updateRowPrice(sym, data);
    } catch { /* skip */ }
    done++;
    $('wlStatus').textContent = `${tr('wl_updating')} ${done}/${syms.length}`;
    if (done < syms.length) await new Promise(r => setTimeout(r, 300));
  }

  $('wlStatus').textContent = tr('wl_updated');

  /* Fetch P/E from Finnhub metrics (more reliable than Yahoo for this field) */
  fetchPEFromFinnhub(syms);
}

/* ── Fetch P/E + Fwd P/E from Finnhub (background, non-blocking) */
async function fetchPEFromFinnhub(syms){
  for (const sym of syms) {
    /* Trailing P/E from stock/metric */
    try {
      const m  = await API.getMetrics(sym);
      const pe = m?.metric?.peExclExtraTTM ?? m?.metric?.peInclExtraTTM ?? null;
      if (pe !== null && pe > 0) {
        if (priceCache[sym]) priceCache[sym].trailingPE = pe;
        const peEl = document.getElementById(`wlpe-${sym}`);
        if (peEl) peEl.textContent = pe.toFixed(1);
      }
    } catch { /* skip */ }

    /* Forward P/E: Alpha Vantage OVERVIEW (cached 24 h) */
    try {
      let fwdPE = getAvFwdPE(sym); // undefined = not cached
      if (fwdPE === undefined) {
        const ov = await API.getAvOverview(sym);
        fwdPE = ov?.forwardPE ?? null;
        setAvFwdPE(sym, fwdPE);
      }
      if (fwdPE !== null && fwdPE > 0) {
        if (priceCache[sym]) priceCache[sym].forwardPE = fwdPE;
        const fwdPEEl = document.getElementById(`wlfwdpe-${sym}`);
        if (fwdPEEl) fwdPEEl.textContent = fwdPE.toFixed(1);
      }
    } catch { /* skip */ }

    await new Promise(r => setTimeout(r, 300));
  }
}

function updateRowPrice(sym, data){
  const priceEl  = document.getElementById(`wlprice-${sym}`);
  const chgEl    = document.getElementById(`wlchg-${sym}`);
  const nameEl   = document.getElementById(`wlname-${sym}`);
  const range52El = document.getElementById(`wl52r-${sym}`);
  const pos52El   = document.getElementById(`wl52p-${sym}`);
  const volEl     = document.getElementById(`wlvol-${sym}`);
  const peEl      = document.getElementById(`wlpe-${sym}`);
  const fwdPEEl   = document.getElementById(`wlfwdpe-${sym}`);
  if (!priceEl) return;

  priceEl.textContent = fmt$(data.price);

  const pct = data.changePercent || 0;
  chgEl.className   = `wl-chg ${pct > 0 ? 'up' : pct < 0 ? 'dn' : 'neu'}`;
  chgEl.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}% (${(data.change||0) >= 0 ? '+' : ''}${Math.abs(data.change||0).toFixed(2)})`;

  if (nameEl && data.shortName) nameEl.textContent = data.shortName;

  if (range52El) {
    range52El.textContent = (data.fiftyTwoWeekHigh && data.fiftyTwoWeekLow)
      ? `${data.fiftyTwoWeekLow.toFixed(2)} — ${data.fiftyTwoWeekHigh.toFixed(2)}`
      : '—';
  }

  if (pos52El) {
    const p = calcWeekPosition(data.price, data.fiftyTwoWeekLow, data.fiftyTwoWeekHigh);
    pos52El.innerHTML = renderPositionBar(p);
  }

  if (volEl)    volEl.textContent   = formatVolume(data.volume);
  if (peEl)     peEl.textContent    = data.trailingPE ? data.trailingPE.toFixed(1) : '—';
  if (fwdPEEl)  fwdPEEl.textContent = (data.forwardPE && data.forwardPE > 0) ? data.forwardPE.toFixed(1) : '—';
}
</script>
</body>
</html>
