<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script>
'use strict';

const $ = id => document.getElementById(id);

/* ── Live price cache ────────────────────────────── */
const priceCache = {};

/* ── Boot ────────────────────────────────────────── */
applyLang();
updateWlBadge();
renderPage();

document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => { setLang(b.dataset.lang); renderPage(); });
});

$('clearAllBtn').addEventListener('click', () => {
  if (!confirm(tr('wl_clear') + '？')) return;
  watchlist.clear();
  saveWatchlist();
  updateWlBadge();
  renderPage();
});

/* ── Render page ─────────────────────────────────── */
function renderPage(){
  const syms = [...watchlist];
  $('clearAllBtn').hidden = syms.length === 0;

  if (syms.length === 0) {
    $('wlEmpty').hidden = false;
    $('wlTable').hidden = true;
    $('wlStatus').textContent = '';
    return;
  }
  $('wlEmpty').hidden = true;
  $('wlTable').hidden = false;
  renderRows(syms);
  fetchAllPrices(syms);
}

/* ── Render rows (skeleton first) ────────────────── */
function renderRows(syms){
  $('wlRows').innerHTML = syms.map(sym => {
    const cached = priceCache[sym];
    return rowHTML(sym, cached);
  }).join('');

  $('wlRows').querySelectorAll('.wl-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const sym = btn.dataset.sym;
      watchlist.delete(sym);
      saveWatchlist();
      updateWlBadge();
      renderPage();
    });
  });
}

function rowHTML(sym, data){
  const priceStr = data ? fmt$(data.c) : `<span class="sk" style="width:72px;height:14px;border-radius:3px"></span>`;
  const chgClass = data ? (data.dp > 0 ? 'up' : data.dp < 0 ? 'dn' : 'neu') : 'loading';
  const chgStr   = data
    ? `${data.dp >= 0 ? '+' : ''}${data.dp.toFixed(2)}% (${data.d >= 0 ? '+' : ''}${Math.abs(data.d).toFixed(2)})`
    : '—';

  return `
<a href="quote.html?symbol=${sym}" class="wl-row" data-sym="${sym}">
  <div class="wl-sym-col">
    <div class="wl-sym-logo">${sym.slice(0,2)}</div>
    <div>
      <div class="wl-sym-name">${sym}</div>
      <div class="wl-sym-fullname" id="wlname-${sym}">—</div>
    </div>
  </div>
  <div class="wl-price-col" id="wlprice-${sym}">${priceStr}</div>
  <div class="wl-chg-col">
    <span class="wl-chg ${chgClass}" id="wlchg-${sym}">${chgStr}</span>
  </div>
  <div class="wl-remove-col">
    <button class="wl-remove" data-sym="${sym}" title="移除" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
</a>`;
}

/* ── Fetch live prices (batched 300ms) ───────────── */
async function fetchAllPrices(syms){
  $('wlStatus').textContent = tr('wl_updating');
  let done = 0;

  for (const sym of syms) {
    try {
      const [q, p] = await Promise.all([
        API.getQuote(sym),
        API.getCompanyProfile(sym).catch(() => ({}))
      ]);
      priceCache[sym] = q;
      updateRowPrice(sym, q, p);
    } catch { /* skip */ }
    done++;
    $('wlStatus').textContent = `${tr('wl_updating')} ${done}/${syms.length}`;
    if (done < syms.length) await new Promise(r => setTimeout(r, 300));
  }

  $('wlStatus').textContent = tr('wl_updated');
}

function updateRowPrice(sym, q, p){
  const priceEl = document.getElementById(`wlprice-${sym}`);
  const chgEl   = document.getElementById(`wlchg-${sym}`);
  const nameEl  = document.getElementById(`wlname-${sym}`);
  if (!priceEl || !chgEl) return;

  priceEl.textContent = fmt$(q.c);

  const up = q.dp >= 0;
  chgEl.className = `wl-chg ${up ? 'up' : q.dp < 0 ? 'dn' : 'neu'}`;
  chgEl.textContent = `${up?'+':''}${q.dp.toFixed(2)}% (${q.d>=0?'+':''}${Math.abs(q.d).toFixed(2)})`;

  if (nameEl && p.name) nameEl.textContent = p.name;
}
</script>
